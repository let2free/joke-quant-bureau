<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>九章量化局 · 测算中心</title>
<link rel="stylesheet" href="static/theme.css">
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.4/dist/chart.umd.min.js"></script>
</head>
<body>

<nav class="header">
  <div style="display:flex;align-items:center;gap:12px;">
    <span style="font-size:1.4rem;">⬡</span>
    <h1>九章量化局</h1>
    <span style="font-size:0.7rem;color:var(--text-dim);background:rgba(168,85,247,0.15);padding:2px 8px;border-radius:4px;">测算中心</span>
  </div>
  <div style="display:flex;align-items:center;gap:20px;">
    <div class="nav-tabs" id="nav-bar"></div>
    <span style="font-size:0.85rem;font-weight:700;color:var(--cyan);" id="clock">--:--:--</span>
  </div>
</nav>

<div class="status-bar has-tip" data-tip="🧮 测算中心 | 九章量化局Phase0-5完整流程 | 6因子打分+IC验证+风控审查 | 数据来源: database.py SQLite + artifacts JSON">
  <div class="status-item"><span class="status-dot live"></span> <strong>测算引擎</strong> v2.0</div>
  <div class="status-item">📅 <span id="st-date">--</span></div>
  <div class="status-item">🔄 Phase: <strong style="color:var(--down)">0-5 完整</strong></div>
  <div class="status-item">🎯 方法: <strong>TrackA+B 双轨融合</strong></div>
</div>

<div class="container">

  <!-- ── 流程执行状态 ── -->
  <div class="panel fade-in">
    <div class="panel-header">
      <h2>🔄 九章量化局 · 流程执行状态</h2>
    </div>
    <div class="phase-flow" id="phase-flow"></div>
  </div>
  
  <!-- ── 核心指标 ── -->
  <div class="kpi-row" id="metrics-grid"></div>
  
  <!-- ── 最新预测 ── -->
  <div class="panel fade-in">
    <div class="panel-header"><h2>🎯 最新预测结果</h2></div>
    <div class="grid grid-2">
      <div><table class="data-table" id="prediction-table"><tr><th>#</th><th>ETF</th><th>预测</th><th>置信度</th><th>理由</th></tr></table></div>
      <div><h3 style="color:var(--text-dim);font-size:0.8rem;margin-bottom:8px;">🕸️ 因子得分</h3><div style="height:350px;"><canvas id="radar-chart"></canvas></div></div>
    </div>
  </div>
  
  <!-- ── 准确率追踪 ── -->
  <div class="panel fade-in">
    <div class="panel-header"><h2>📈 准确率追踪</h2></div>
    <div class="grid grid-2">
      <div><h3 style="color:var(--text-dim);font-size:0.8rem;margin-bottom:8px;">📊 历史准确率</h3><div style="height:280px;"><canvas id="accuracy-chart"></canvas></div></div>
      <div><h3 style="color:var(--text-dim);font-size:0.8rem;margin-bottom:8px;">📉 误差分析</h3><div style="height:280px;"><canvas id="error-chart"></canvas></div></div>
    </div>
  </div>
  
  <!-- ── 风险+复盘 ── -->
  <div class="panel fade-in">
    <div class="panel-header"><h2>⚠️ 风险提示 & 复盘结论</h2></div>
    <div class="grid grid-2">
      <div id="risk-list"></div>
      <div><div id="success-list"></div><div style="margin-top:12px;" id="improve-list"></div></div>
    </div>
  </div>

</div>

<script src="static/common.js"></script>
<script>
document.getElementById('nav-bar').innerHTML = renderNav('jiuzhang');
updateClock('clock'); setInterval(()=>updateClock('clock'),1000);

// 模拟数据（实际使用时从API获取）
const mockData = {
  phases: [
    { name: 'Phase 0', agent: '系统', status: 'completed', label: '因子预检' },
    { name: 'Phase 1', agent: '大A+老美+军机处', status: 'completed', label: '并行侦察' },
    { name: 'Phase 2', agent: '量化1哥+数据工程师', status: 'completed', label: '深度分析' },
    { name: 'Phase 3', agent: '因子研究员', status: 'completed', label: '交叉验证' },
    { name: 'Phase 4', agent: '包青天', status: 'completed', label: '风控审查' },
    { name: 'Phase 5', agent: '指挥官', status: 'completed', label: '双轨融合' }
  ],
  metrics: [
    { label: '预测日期', value: '2026-06-17', change: '周二' },
    { label: '方向准确率', value: '100%', change: '历史最佳', up: true },
    { label: '校准系数', value: '0.6', change: '基于误差校准' },
    { label: '市场状态', value: '震荡偏多', change: '中性偏宽松' }
  ],
  agents: [
    { name: '指挥官', icon: '👑', role: '协调者', status: 'online' },
    { name: '大A', icon: '🇨🇳', role: 'A股哨兵', status: 'online' },
    { name: '老美', icon: '🇺🇸', role: '美股哨兵', status: 'online' },
    { name: '军机处', icon: '🌍', role: '宏观情报', status: 'online' },
    { name: '量化1哥', icon: '📊', role: '因子打分', status: 'online' },
    { name: '包青天', icon: '⚖️', role: '风控审查', status: 'online' },
    { name: '史官', icon: '📚', role: '历史记录', status: 'idle' },
    { name: '执行者', icon: '⚡', role: '任务执行', status: 'idle' },
    { name: '因子研究员', icon: '🔬', role: '交叉验证', status: 'online' }
  ],
  predictions: [
    { rank: 1, name: '芯片ETF', pred: 2.31, confidence: '高', reason: '动量强+资金流入+双轨一致' },
    { rank: 2, name: '人工智能ETF', pred: 2.17, confidence: '高', reason: '科技主线+政策利好' },
    { rank: 3, name: '军工ETF', pred: 1.97, confidence: '高', reason: '地缘催化+资金流入' },
    { rank: 4, name: '通信ETF', pred: 1.77, confidence: '中', reason: '动量延续' },
    { rank: 5, name: '新能源ETF', pred: 1.61, confidence: '中', reason: '政策支持' },
    { rank: 6, name: '证券ETF', pred: 1.41, confidence: '中', reason: '市场回暖' }
  ],
  sellSignals: [
    { name: '创新药ETF', pred: -1.25, reason: '均值回归失败+资金流出' },
    { name: '医药ETF', pred: -0.85, reason: '行业利空+动量转弱' }
  ],
  risks: [
    { level: 'high', icon: '🔴', content: '美联储议息会议（6/17-18）：鹰派言论可能引发回调' },
    { level: 'medium', icon: '🟡', content: '芯片ETF涨幅已大：注意回调风险' },
    { level: 'medium', icon: '🟡', content: '地缘政治风险：关注中东局势' },
    { level: 'low', icon: '🟢', content: '成交量萎缩：若持续萎缩，反弹可能乏力' }
  ],
  success: [
    '方向判断100%准确：所有ETF涨跌方向判断正确',
    '排名基本准确：预测前3的ETF实际涨幅也排前列',
    '创新药ETF下跌预测准确：均值回归因子有效'
  ],
  improve: [
    '预测幅度偏大：需要校准预测模型',
    '模拟数据问题：需要接入通达信实时数据',
    '因子权重：波动率和微观结构因子权重可降低'
  ]
};

// 初始化
document.addEventListener('DOMContentLoaded', function() {
  renderPhases();
  renderMetrics();
  renderAgents();
  renderPredictions();
  renderRisks();
  renderConclusion();
  renderAccuracyChart();
  renderErrorChart();
  renderRadarChart();
  updateClock();
  setInterval(updateClock, 1000);
});

function updateClock() {
  document.getElementById('clock').textContent = new Date().toLocaleTimeString('zh-CN');
}

function renderPhases() {
  const container = document.getElementById('phase-flow');
  container.innerHTML = mockData.phases.map((phase, i) => {
    const statusClass = phase.status === 'completed' ? 'completed' : phase.status === 'active' ? 'active' : '';
    return `
      ${i > 0 ? '<span class="phase-arrow">→</span>' : ''}
      <div class="phase-step ${statusClass}">
        <div class="phase-name">${phase.name}</div>
        <div class="phase-agent">${phase.agent}</div>
        <div style="font-size:0.7rem;color:#6b7b99">${phase.label}</div>
      </div>
    `;
  }).join('');
}

function renderMetrics() {
  const grid = document.getElementById('metrics-grid');
  grid.innerHTML = mockData.metrics.map(m => `
    <div class="metric-card">
      <div class="metric-value">${m.value}</div>
      <div class="metric-label">${m.label}</div>
      <div class="metric-change ${m.up ? 'metric-up' : ''}">${m.change}</div>
    </div>
  `).join('');
}

function renderAgents() {
  const grid = document.getElementById('agent-grid');
  grid.innerHTML = mockData.agents.map(a => `
    <div class="agent-card">
      <div class="agent-icon">${a.icon}</div>
      <div class="agent-name">${a.name}</div>
      <div class="agent-role">${a.role}</div>
      <div class="agent-status status-${a.status}">
        ${a.status === 'online' ? '● 在线' : a.status === 'busy' ? '● 繁忙' : '○ 待机'}
      </div>
    </div>
  `).join('');
}

function renderPredictions() {
  const table = document.getElementById('prediction-table');
  table.innerHTML = '<tr><th>排名</th><th>ETF</th><th>预测涨跌</th><th>置信度</th><th>理由</th></tr>';
  
  mockData.predictions.forEach(p => {
    const confClass = p.confidence === '高' ? 'confidence-high' : p.confidence === '中' ? 'confidence-medium' : 'confidence-low';
    table.innerHTML += `
      <tr>
        <td style="color:var(--blue);font-weight:bold">${p.rank}</td>
        <td>${p.name}</td>
        <td class="up">+${p.pred.toFixed(2)}%</td>
        <td><span class="confidence-badge ${confClass}">${p.confidence}</span></td>
        <td style="font-size:0.75rem;color:#6b7b99">${p.reason}</td>
      </tr>
    `;
  });
  
  // 卖出信号
  if (mockData.sellSignals.length > 0) {
    table.innerHTML += '<tr><td colspan="5" style="color:var(--up);font-weight:bold;padding-top:10px">⚠️ 卖出信号</td></tr>';
    mockData.sellSignals.forEach(s => {
      table.innerHTML += `
        <tr>
          <td>-</td>
          <td>${s.name}</td>
          <td class="down">${s.pred.toFixed(2)}%</td>
          <td><span class="confidence-badge confidence-low">谨慎</span></td>
          <td style="font-size:0.75rem;color:#6b7b99">${s.reason}</td>
        </tr>
      `;
    });
  }
}

function renderRisks() {
  const container = document.getElementById('risk-list');
  container.innerHTML = mockData.risks.map(r => `
    <div class="risk-item">
      <span class="risk-icon">${r.icon}</span>
      <div class="risk-content">${r.content}</div>
      <span class="risk-level risk-${r.level}">${r.level === 'high' ? '高风险' : r.level === 'medium' ? '中风险' : '低风险'}</span>
    </div>
  `).join('');
}

function renderConclusion() {
  const successList = document.getElementById('success-list');
  successList.innerHTML = mockData.success.map(s => `
    <div style="padding:5px 0;font-size:0.85rem;">• ${s}</div>
  `).join('');
  
  const improveList = document.getElementById('improve-list');
  improveList.innerHTML = mockData.improve.map(i => `
    <div style="padding:5px 0;font-size:0.85rem;">• ${i}</div>
  `).join('');
}

function renderAccuracyChart() {
  new Chart(document.getElementById('accuracy-chart'), {
    type: 'line',
    data: {
      labels: ['6/12', '6/15', '6/16', '6/17'],
      datasets: [{
        label: '方向准确率(%)',
        data: [33, 50, 100, null],
        borderColor: '#4a6cf5',
        backgroundColor: 'rgba(74,108,245,0.1)',
        fill: true,
        tension: 0.3
      }]
    },
    options: {
      responsive: true,
      maintainAspectRatio: false,
      plugins: { legend: { display: false } },
      scales: {
        x: { ticks: { color: '#6b7b99' }, grid: { color: '#1e264a' } },
        y: { min: 0, max: 100, ticks: { color: '#6b7b99', callback: v => v + '%' }, grid: { color: '#1e264a' } }
      }
    }
  });
}

function renderErrorChart() {
  new Chart(document.getElementById('error-chart'), {
    type: 'bar',
    data: {
      labels: ['科创50', '通信', '半导体', '机器人', '新能源', '创新药'],
      datasets: [{
        label: '预测误差(%)',
        data: [4.41, 4.26, 4.33, 1.26, 0.33, 1.21],
        backgroundColor: [
          'rgba(255,77,106,0.7)', 'rgba(255,77,106,0.7)', 'rgba(255,77,106,0.7)',
          'rgba(255,159,67,0.7)', 'rgba(0,230,118,0.7)', 'rgba(255,159,67,0.7)'
        ],
        borderWidth: 0
      }]
    },
    options: {
      responsive: true,
      maintainAspectRatio: false,
      plugins: { legend: { display: false } },
      scales: {
        x: { ticks: { color: '#6b7b99' }, grid: { display: false } },
        y: { ticks: { color: '#6b7b99', callback: v => v + '%' }, grid: { color: '#1e264a' } }
      }
    }
  });
}

function renderRadarChart() {
  new Chart(document.getElementById('radar-chart'), {
    type: 'radar',
    data: {
      labels: ['动量', '资金流', '均值回归', '波动率', '微观结构', '市场状态'],
      datasets: [
        {
          label: '芯片ETF',
          data: [88, 85, 52, 65, 75, 85],
          borderColor: '#4a6cf5',
          backgroundColor: 'rgba(74,108,245,0.2)'
        },
        {
          label: '人工智能ETF',
          data: [85, 82, 48, 60, 70, 85],
          borderColor: '#00d4ff',
          backgroundColor: 'rgba(0,212,255,0.2)'
        }
      ]
    },
    options: {
      responsive: true,
      maintainAspectRatio: false,
      plugins: { legend: { position: 'bottom', labels: { color: '#6b7b99' } } },
      scales: {
        r: {
          min: 0, max: 100,
          ticks: { color: '#6b7b99', backdropColor: 'transparent', stepSize: 20 },
          grid: { color: '#1e264a' },
          pointLabels: { color: '#c0c8e0' },
          angleLines: { color: '#1e264a' }
        }
      }
    }
  });
}

// ── 导航 ──
document.getElementById('nav-bar').innerHTML = renderNav('jiuzhang');
updateClock('clock'); setInterval(()=>updateClock('clock'),1000);
</script>
</body>
</html>
