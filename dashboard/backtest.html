<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>九章量化局 · 回测中心</title>
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.1/dist/chart.umd.min.js"></script>
  <link rel="stylesheet" href="static/theme.css">
</head>
<body>
  <nav class="header">
  <div style="display:flex;align-items:center;gap:12px;">
    <span style="font-size:1.4rem;">⬡</span>
    <h1>九章量化局</h1>
    <span style="font-size:0.7rem;color:var(--text-dim);background:rgba(255,77,106,0.15);padding:2px 8px;border-radius:4px;">回测验证</span>
  </div>
  <div style="display:flex;align-items:center;gap:20px;">
    <div class="nav-tabs" id="nav-bar"></div>
    <span style="font-size:0.85rem;font-weight:700;color:var(--cyan);" id="clock">--:--:--</span>
  </div>
</nav>
  
  <div class="container">
    <!-- 准确率趋势 -->
    <div class="grid grid-2">
      <div class="panel">
        <div class="card-title">📈 准确率趋势</div>
        <div class="chart-container">
          <canvas id="accuracyChart"></canvas>
        </div>
      </div>
      
      <div class="panel">
        <div class="card-title">💰 回测权益曲线</div>
        <div class="chart-container">
          <canvas id="equityChart"></canvas>
        </div>
      </div>
    </div>
    
    <!-- 回测参数设置 -->
    <div class="grid grid-2">
      <div class="panel">
        <div class="card-title">⚙️ 回测参数设置</div>
        
        <div class="form-group">
          <label class="form-label">开始日期</label>
          <input type="date" class="form-input" id="startDate" value="2026-06-01">
        </div>
        
        <div class="form-group">
          <label class="form-label">结束日期</label>
          <input type="date" class="form-input" id="endDate" value="2026-06-16">
        </div>
        
        <div class="form-group">
          <label class="form-label">初始资金（元）</label>
          <input type="number" class="form-input" id="initialCapital" value="100000">
        </div>
        
        <div class="form-group">
          <label class="form-label">买入Top N（个ETF）</label>
          <input type="number" class="form-input" id="topN" value="5" min="1" max="10">
        </div>
        
        <div class="form-group">
          <label class="form-label">持有天数</label>
          <input type="number" class="form-input" id="holdDays" value="5" min="1" max="30">
        </div>
        
        <button class="btn btn-primary" onclick="runBacktest()">🚀 运行回测</button>
      </div>
      
      <div class="panel">
        <div class="card-title">📊 回测结果</div>
        <div id="backtestResult">
          <div class="loading">等待回测...</div>
        </div>
      </div>
    </div>
    
    <!-- 因子权重优化 -->
    <div class="grid grid-2">
      <div class="panel">
        <div class="card-title">⚡ 因子权重优化器</div>
        
        <div class="form-group">
          <label class="form-label">优化日期范围</label>
          <input type="date" class="form-input" id="optStartDate" value="2026-06-01" style="margin-bottom: 8px;">
          <input type="date" class="form-input" id="optEndDate" value="2026-06-16">
        </div>
        
        <button class="btn btn-secondary" onclick="optimizeFactors()">🔬 开始优化</button>
        
        <div id="optimizationResult" style="margin-top: 12px;">
          <div class="loading">等待优化...</div>
        </div>
      </div>
      
      <div class="panel">
        <div class="card-title">📋 当前因子权重</div>
        <div id="currentWeights">
          <div class="loading">加载中...</div>
        </div>
      </div>
    </div>
  </div>
  
  <script>
    let accuracyChart = null;
    let equityChart = null;
    
    // 初始化
    async function init() {
      updateClock();
      setInterval(updateClock, 1000);
      
      await loadAccuracyTrend();
      await loadCurrentWeights();
    }
    
    // 更新时钟
    function updateClock() {
      const now = new Date();
      const timeStr = now.toLocaleTimeString('zh-CN', { hour12: false });
      document.getElementById('clock').textContent = timeStr;
    }
    
    // 加载准确率趋势
    async function loadAccuracyTrend() {
      try {
        const resp = await fetch('/api/backtest/accuracy?start=2026-06-01&end=2026-06-30');
        const data = await resp.json();
        
        const ctx = document.getElementById('accuracyChart').getContext('2d');
        
        if (accuracyChart) accuracyChart.destroy();
        
        accuracyChart = new Chart(ctx, {
          type: 'line',
          data: {
            labels: data.dates || [],
            datasets: [
              {
                label: '排名准确率',
                data: data.rank_accuracy || [],
                borderColor: '#3b82f6',
                backgroundColor: 'rgba(59, 130, 246, 0.1)',
                tension: 0.4
              },
              {
                label: 'Top3准确率',
                data: data.top3_accuracy || [],
                borderColor: '#22c55e',
                backgroundColor: 'rgba(34, 197, 94, 0.1)',
                tension: 0.4
              },
              {
                label: '方向准确率',
                data: data.direction_accuracy || [],
                borderColor: '#f59e0b',
                backgroundColor: 'rgba(245, 158, 11, 0.1)',
                tension: 0.4
              }
            ]
          },
          options: {
            responsive: true,
            maintainAspectRatio: false,
            plugins: {
              legend: { labels: { color: '#e2e8f0' } }
            },
            scales: {
              x: { ticks: { color: '#64748b', maxRotation: 45 } },
              y: { ticks: { color: '#64748b' }, beginAtZero: true, max: 100 }
            }
          }
        });
      } catch (err) {
        console.error('加载准确率趋势失败:', err);
      }
    }
    
    // 运行回测
    async function runBacktest() {
      const startDate = document.getElementById('startDate').value;
      const endDate = document.getElementById('endDate').value;
      const initialCapital = parseFloat(document.getElementById('initialCapital').value);
      const topN = parseInt(document.getElementById('topN').value);
      const holdDays = parseInt(document.getElementById('holdDays').value);
      
      document.getElementById('backtestResult').innerHTML = '<div class="loading">回测中...</div>';
      
      try {
        const resp = await fetch('/api/backtest/run', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({
            start_date: startDate,
            end_date: endDate,
            initial_capital: initialCapital,
            top_n: topN,
            hold_days: holdDays
          })
        });
        
        const data = await resp.json();
        
        if (data.status === 'success') {
          showBacktestResult(data);
          updateEquityChart(data.results.equity_curve);
        } else {
          document.getElementById('backtestResult').innerHTML = `<div class="result-box">❌ 回测失败: ${data.message}</div>`;
        }
      } catch (err) {
        document.getElementById('backtestResult').innerHTML = `<div class="result-box">❌ 回测失败: ${err.message}</div>`;
      }
    }
    
    // 显示回测结果
    function showBacktestResult(data) {
      const results = data.results;
      const html = `
        <div class="result-box">
          <div class="result-item">
            <span class="result-label">初始资金</span>
            <span class="result-value">¥${results.initial_capital.toLocaleString()}</span>
          </div>
          <div class="result-item">
            <span class="result-label">最终权益</span>
            <span class="result-value">¥${results.final_equity.toLocaleString()}</span>
          </div>
          <div class="result-item">
            <span class="result-label">总收益率</span>
            <span class="result-value ${results.total_return_pct >= 0 ? 'positive' : 'negative'}">${results.total_return_pct.toFixed(2)}%</span>
          </div>
          <div class="result-item">
            <span class="result-label">交易次数</span>
            <span class="result-value">${results.num_trades} 笔</span>
          </div>
          <div class="result-item">
            <span class="result-label">胜率</span>
            <span class="result-value ${results.win_rate >= 50 ? 'positive' : 'negative'}">${results.win_rate.toFixed(2)}%</span>
          </div>
          <div class="result-item">
            <span class="result-label">夏普比率</span>
            <span class="result-value ${results.sharpe_ratio >= 1 ? 'positive' : 'negative'}">${results.sharpe_ratio.toFixed(2)}</span>
          </div>
          <div class="result-item">
            <span class="result-label">最大回撤</span>
            <span class="result-value negative">${results.max_drawdown_pct.toFixed(2)}%</span>
          </div>
        </div>
      `;
      
      document.getElementById('backtestResult').innerHTML = html;
    }
    
    // 更新权益曲线
    function updateEquityChart(equityCurve) {
      if (!equityCurve || equityCurve.length === 0) return;
      
      const ctx = document.getElementById('equityChart').getContext('2d');
      
      if (equityChart) equityChart.destroy();
      
      equityChart = new Chart(ctx, {
        type: 'line',
        data: {
          labels: equityCurve.map(p => p.date),
          datasets: [{
            label: '权益曲线',
            data: equityCurve.map(p => p.equity),
            borderColor: '#22c55e',
            backgroundColor: 'rgba(34, 197, 94, 0.1)',
            fill: true,
            tension: 0.4
          }]
        },
        options: {
          responsive: true,
          maintainAspectRatio: false,
          plugins: {
            legend: { labels: { color: '#e2e8f0' } }
          },
          scales: {
            x: { ticks: { color: '#64748b', maxRotation: 45 } },
            y: { ticks: { color: '#64748b' } }
          }
        }
      });
    }
    
    // 因子权重优化
    async function optimizeFactors() {
      const startDate = document.getElementById('optStartDate').value;
      const endDate = document.getElementById('optEndDate').value;
      
      document.getElementById('optimizationResult').innerHTML = '<div class="loading">优化中...</div>';
      
      try {
        const resp = await fetch(`/api/backtest/factor-optimize?start=${startDate}&end=${endDate}`);
        const data = await resp.json();
        
        if (data.status === 'success') {
          showOptimizationResult(data);
        } else {
          document.getElementById('optimizationResult').innerHTML = `<div class="result-box">⚠️ ${data.message}</div>`;
        }
      } catch (err) {
        document.getElementById('optimizationResult').innerHTML = `<div class="result-box">❌ 优化失败: ${err.message}</div>`;
      }
    }
    
    // 显示优化结果
    function showOptimizationResult(data) {
      const weights = data.best_weights;
      const performance = data.factor_performance;
      
      let html = `
        <div class="result-box">
          <div style="margin-bottom: 8px; color: var(--green);">✅ ${data.message}</div>
          <div style="margin-bottom: 12px; font-size: 0.8rem; color: var(--muted);">改进: ${data.improvement}</div>
      `;
      
      for (const [factor, weight] of Object.entries(weights)) {
        const perf = performance[factor] || 0;
        html += `
          <div class="result-item">
            <span class="result-label">${factor}</span>
            <span class="result-value">${(weight * 100).toFixed(0)}% (表现: ${(perf * 100).toFixed(0)}%)</span>
          </div>
        `;
      }
      
      html += '</div>';
      
      document.getElementById('optimizationResult').innerHTML = html;
    }
    
    // 加载当前权重
    async function loadCurrentWeights() {
      try {
        const resp = await fetch('/api/backtest/settings');
        const data = await resp.json();
        
        const weights = data.weights_history[data.weights_history.length - 1].weights;
        
        let html = '<div class="result-box">';
        
        for (const [factor, weight] of Object.entries(weights)) {
          html += `
            <div class="result-item">
              <span class="result-label">${factor}</span>
              <span class="result-value">${(weight * 100).toFixed(0)}%</span>
            </div>
          `;
        }
        
        html += '</div>';
        
        document.getElementById('currentWeights').innerHTML = html;
      } catch (err) {
        document.getElementById('currentWeights').innerHTML = '<div class="result-box">❌ 加载失败</div>';
      }
    }
    
    // 页面加载时初始化
    window.addEventListener('load', init);
  </script>
<script src="static/common.js"></script>
<script>
document.getElementById('nav-bar').innerHTML = renderNav('backtest');
updateClock('clock'); setInterval(()=>updateClock('clock'),1000);
</script>
</body>
</html>
