<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>九章量化局 · 实时看板 v2.0</title>
<link rel="stylesheet" href="static/theme.css">
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.4/dist/chart.umd.min.js"></script>
</head>
<body>

<nav class="header">
  <div style="display:flex;align-items:center;gap:12px;">
    <span style="font-size:1.4rem;">⬡</span>
    <h1>九章量化局</h1>
    <span style="font-size:0.7rem;color:var(--text-dim);background:rgba(74,108,245,0.15);padding:2px 8px;border-radius:4px;">v2.0</span>
  </div>
  <div style="display:flex;align-items:center;gap:20px;">
    <div class="nav-tabs" id="nav-bar"></div>
    <span style="font-size:0.85rem;font-weight:700;color:var(--cyan);" id="clock">--:--:--</span>
  </div>
</nav>

<div class="status-bar" id="status-bar">
  <!-- JS填充 -->
</div>

<div class="container">

  <!-- ── KPI关键指标 ── -->
  <div class="kpi-row" id="kpi-row">
    <!-- JS填充 -->
  </div>

  <!-- ── 今日复盘 ── -->
  <div class="panel fade-in">
    <div class="panel-header">
      <h2>📝 今日复盘总结</h2>
      <span class="panel-badge badge-live" id="recap-date-badge">--</span>
    </div>
    <div style="display:grid;grid-template-columns:1fr 1fr;gap:20px;">
      <div>
        <div class="chart-box"><canvas id="accuracy-chart"></canvas></div>
      </div>
      <div id="recap-comparison">
        <!-- JS填充 -->
      </div>
    </div>
  </div>

  <!-- ── 次日预测 ── -->
  <div class="panel fade-in" style="animation-delay:0.1s;">
    <div class="panel-header">
      <h2>🎯 今日预测排名</h2>
      <span class="panel-badge badge-warn" id="pred-date-badge">--</span>
    </div>
    <div class="predict-rank" id="predict-cards">
      <!-- JS填充 -->
    </div>
  </div>

  <!-- ── ETF实时排名 ── -->
  <div class="panel fade-in" style="animation-delay:0.2s;">
    <div class="panel-header">
      <h2>📈 ETF实时排名</h2>
      <span class="panel-badge badge-live">TOP 10</span>
    </div>
    <div style="overflow-x:auto;">
      <table class="data-table" id="etf-table">
        <tr><th>#</th><th>代码</th><th>名称</th><th>最新价</th><th>涨跌幅</th><th>成交额</th><th>换手率</th></tr>
      </table>
    </div>
    <div style="text-align:right;margin-top:10px;">
      <a href="etf_monitor.html" style="color:var(--cyan);font-size:0.8rem;text-decoration:none;">📊 ETF监测中心 →</a>
    </div>
  </div>

  <!-- ── 可视化分析 ── -->
  <div class="panel fade-in" style="animation-delay:0.25s;">
    <div class="panel-header">
      <h2>📊 多维可视化分析</h2>
      <span class="panel-badge badge-live">对比图表</span>
    </div>
    <div style="display:grid;grid-template-columns:1fr 1fr;gap:16px;">
      <div>
        <h3 style="color:var(--text-dim);font-size:0.8rem;margin-bottom:8px;">🕸️ 因子雷达图 (Top 3 ETF)</h3>
        <div style="height:300px;"><canvas id="radar-chart"></canvas></div>
      </div>
      <div>
        <h3 style="color:var(--text-dim);font-size:0.8rem;margin-bottom:8px;">📊 预测 vs 实际柱状对比</h3>
        <div style="height:300px;"><canvas id="bar-chart"></canvas></div>
      </div>
      <div>
        <h3 style="color:var(--text-dim);font-size:0.8rem;margin-bottom:8px;">🎯 预测误差离散分布</h3>
        <div style="height:260px;"><canvas id="scatter-chart"></canvas></div>
      </div>
      <div>
        <h3 style="color:var(--text-dim);font-size:0.8rem;margin-bottom:8px;">🍩 行业涨跌分布饼图</h3>
        <div style="height:260px;"><canvas id="pie-chart"></canvas></div>
      </div>
    </div>
  </div>

  <!-- ── 资金流向 + 行业热力 ── -->
  <div class="panel fade-in" style="animation-delay:0.28s;">
    <div class="panel-header">
      <h2>💰 资金流向 & 行业分布</h2>
    </div>
    <div style="display:grid;grid-template-columns:2fr 1fr;gap:16px;">
      <div>
        <h3 style="color:var(--text-dim);font-size:0.8rem;margin-bottom:8px;">📈 行业资金流向柱状图</h3>
        <div style="height:300px;"><canvas id="flow-bar-chart"></canvas></div>
      </div>
      <div>
        <h3 style="color:var(--text-dim);font-size:0.8rem;margin-bottom:8px;">📋 因子权重构成</h3>
        <div style="height:300px;"><canvas id="weight-pie-chart"></canvas></div>
      </div>
    </div>
  </div>

  <!-- ── 风险与看空 ── -->
  <div class="panel fade-in" style="animation-delay:0.3s;">
    <div class="panel-header">
      <h2>⚠️ 风险提示 & 看空信号</h2>
    </div>
    <div style="display:grid;grid-template-columns:1fr 1fr;gap:16px;">
      <div id="risk-list"></div>
      <div id="sell-list"></div>
    </div>
  </div>

</div>

<script src="static/common.js"></script>
<script>
(function(){
// ── 导航 ──
document.getElementById('nav-bar').innerHTML = renderNav('dashboard');
updateClock('clock'); setInterval(()=>updateClock('clock'),1000);

// ── 状态栏 ──
function renderStatus() {
  document.getElementById('status-bar').innerHTML = `
    <div class="status-item"><span class="status-dot live"></span> <strong>实时</strong> 数据同步中</div>
    <div class="status-item">📅 <span id="st-date">--</span></div>
    <div class="status-item">📊 ETF: <strong id="st-etf">62</strong> 只</div>
    <div class="status-item">🎯 准确率: <strong style="color:var(--down)" id="st-acc">--</strong></div>
  `;
}

// ── KPI卡片 ──
function renderKPI(data) {
  const grid = document.getElementById('kpi-row');
  const items = [
    {icon:'🎯',value:data.accuracy||'--',label:'方向准确率',sub:'历史最佳',color:data.accColor||'var(--down)'},
    {icon:'📉',value:data.avgError||'--',label:'平均误差',sub:data.errorSub||'持续改善',color:'var(--orange)'},
    {icon:'⭐',value:data.best||'--',label:'今日最准',sub:'预测最接近',color:'var(--cyan)'},
    {icon:'⚠️',value:data.worst||'--',label:'最大偏差',sub:'需要优化',color:'var(--up)'}
  ];
  grid.innerHTML = items.map((it,i)=>`
    <div class="kpi-card fade-in" style="animation-delay:${i*0.08}s">
      <div class="kpi-icon">${it.icon}</div>
      <div class="kpi-value" style="color:${it.color}" id="kpi-${i}">${it.value}</div>
      <div class="kpi-label">${it.label}</div>
      <div class="kpi-change" style="color:${it.color}">${it.sub}</div>
      <div class="kpi-bar" style="width:${60+i*15}%;background:${it.color};"></div>
    </div>
  `).join('');
}

// ── 预测卡片网格 ──
function renderPredictCards(data) {
  if(!data||!data.rankings) return;
  document.getElementById('pred-date-badge').textContent = data.date || '--';
  
  const container = document.getElementById('predict-cards');
  container.innerHTML = data.rankings.map((r,i)=>{
    const pct = r.calibrated_prediction || r.chg_pct || 0;
    const cls = pct >= 0 ? 'var(--up)' : 'var(--down)';
    const conf = r.confidence || '中';
    const confW = conf==='高'?'80%':conf==='中'?'55%':'30%';
    const confC = conf==='高'?'var(--down)':conf==='中'?'var(--orange)':'var(--up)';
    return `<div class="rank-item fade-in" style="animation-delay:${i*0.06}s">
      <div class="rank-num">${i+1}</div>
      <div class="etf-name">${r.name}</div>
      <div class="etf-code">${r.code||''} · <span style="color:${confC}">${conf}置信</span></div>
      <div class="predict-pct" style="color:${cls}">${pct>=0?'+':''}${pct.toFixed(2)}%</div>
      <div class="confidence-bar" style="width:${confW};background:linear-gradient(90deg,${confC},var(--down))"></div>
      <div class="reason">${r.reason||''}</div>
    </div>`;
  }).join('');
}

// ── 复盘对比 ──
function renderRecap(data, acc) {
  document.getElementById('recap-date-badge').textContent = acc && acc.length>0 ? acc[acc.length-1].date : '--';
  renderKPI({
    accuracy: acc && acc.length>0 ? ((acc[acc.length-1].accuracy||acc[acc.length-1].direction_accuracy||0)*100).toFixed(0)+'%' : '--',
    avgError: acc && acc.length>0 && acc[acc.length-1].avg_error ? (acc[acc.length-1].avg_error*100).toFixed(1)+'%' : '--',
    best: acc && acc.length>0 ? acc[acc.length-1].best_prediction||'--' : '--',
    worst: acc && acc.length>0 ? acc[acc.length-1].worst_prediction||'--' : '--',
    accColor: acc && acc.length>0 && acc[acc.length-1].accuracy>=0.8 ? 'var(--down)' : 'var(--orange)',
    errorSub: acc && acc.length>0 && acc[acc.length-1].avg_error<0.03 ? '高精度' : '持续改善'
  });
  
  const div = document.getElementById('recap-comparison');
  if(!data||!data.rankings) { div.innerHTML='<div style="color:var(--text-dim)">暂无数据</div>'; return; }
  let html = '<table class="data-table"><tr><th>ETF</th><th>预测</th><th>实际</th><th>误差</th><th>方向</th></tr>';
  data.rankings.forEach(r=>{
    const pred = r.calibrated_prediction||r.chg_pct||0;
    const act = r.actual_change;
    const err = act!=null ? Math.abs(pred-act).toFixed(2) : '-';
    const dir = act!=null ? ((pred>=0&&act>=0)||(pred<0&&act<0)?'✅':'❌') : '-';
    html += `<tr>
      <td style="font-weight:600">${r.name}</td>
      <td class="${pred>=0?'up':'down'}">${pred>=0?'+':''}${pred.toFixed(2)}%</td>
      <td class="${act!=null&&act>=0?'up':'down'}">${act!=null?(act>=0?'+':'')+act.toFixed(2)+'%':'-'}</td>
      <td>${err!=='-'?err+'%':'-'}</td>
      <td>${dir}</td>
    </tr>`;
  });
  div.innerHTML = html + '</table>';
}

// ── 准确率图表 ──
var chart;
function renderAccuracyChart(acc) {
  if(!acc||acc.length===0) return;
  if(chart) chart.destroy();
  chart = new Chart(document.getElementById('accuracy-chart'),{
    type:'line',
    data:{
      labels:acc.map(a=>a.date),
      datasets:[{
        label:'方向准确率', data:acc.map(a=>(a.accuracy||a.direction_accuracy||0)*100),
        borderColor:'#4a6cf5', backgroundColor:'rgba(74,108,245,0.08)',
        fill:true, tension:0.4, pointRadius:5, pointBackgroundColor:'#4a6cf5',
        borderWidth:2
      }]
    },
    options:{
      responsive:true, maintainAspectRatio:false,
      plugins:{legend:{display:false}},
      scales:{
        x:{ticks:{color:'#6b7b99'},grid:{color:'#1e2a4a'}},
        y:{min:0,max:100,ticks:{color:'#6b7b99',callback:v=>v+'%'},grid:{color:'#1e2a4a'}}
      }
    }
  });
}

// ── ETF表格 ──
async function loadETFTable() {
  try {
    const r = await api('/api/etf/rankings?top=10&sort=change_pct');
    const tbl = document.getElementById('etf-table');
    tbl.innerHTML = '<tr><th>#</th><th>代码</th><th>名称</th><th>最新价</th><th>涨跌幅</th><th>成交额</th><th>换手率</th></tr>';
    r.forEach((e,i)=>{
      const cls = e.change_pct >= 0 ? 'up' : 'down';
      tbl.innerHTML += `<tr>
        <td style="color:var(--blue);font-weight:700">${i+1}</td>
        <td style="color:var(--blue);font-family:monospace">${e.code}</td>
        <td>${e.name}</td>
        <td style="font-family:monospace">${(e.price||0).toFixed(3)}</td>
        <td class="${cls}">${cls==='up'?'+':''}${(e.change_pct||0).toFixed(2)}%</td>
        <td>${((e.amount||0)/1e8).toFixed(2)}亿</td>
        <td>${(e.turnover_rate||0).toFixed(2)}%</td>
      </tr>`;
    });
  } catch(e) {}
}

// ── 风险列表 ──
function renderRisks(data) {
  const rDiv = document.getElementById('risk-list');
  const sDiv = document.getElementById('sell-list');
  rDiv.innerHTML = '<h3 style="color:var(--text-dim);font-size:0.85rem;margin-bottom:8px;">🔴 风险因素</h3>';
  sDiv.innerHTML = '<h3 style="color:var(--text-dim);font-size:0.85rem;margin-bottom:8px;">🔻 看空信号</h3>';
  
  if(data&&data.risk_warnings){
    data.risk_warnings.forEach(r=>{
      rDiv.innerHTML += `<div class="risk-bar risk-mid">${r}</div>`;
    });
  } else {
    rDiv.innerHTML += '<div class="risk-bar risk-low">暂无风险提示</div>';
  }
  
  if(data&&data.sell_signals&&data.sell_signals.length>0){
    data.sell_signals.forEach(s=>{
      sDiv.innerHTML += `<div class="rank-item" style="margin-bottom:8px;">
        <div class="etf-name">${s.name}</div>
        <div class="predict-pct" style="color:var(--down)">${(s.prediction||0)<0?'':'+'}${(s.prediction||0).toFixed(2)}%</div>
        <div class="reason">${s.reason||''}</div>
      </div>`;
    });
  } else {
    sDiv.innerHTML += '<div style="color:var(--text-dim)">暂无看空信号</div>';
  }
}

// ── 主加载 ──
async function loadAll() {
  try {
    const [predRes, accRes] = await Promise.all([api('/api/predictions/latest'), api('/api/accuracy/history')]);
    renderPredictCards(predRes);
    renderRecap(predRes, accRes);
    renderAccuracyChart(accRes);
    renderRisks(predRes);
    renderRadar(predRes);
    renderBarChart(predRes);
    renderScatter(predRes);
    renderPieChart(predRes);
    renderFlowBar();
    renderWeightPie();
    renderStatus();
    document.getElementById('st-acc').textContent = accRes.length>0 ? ((accRes[accRes.length-1].accuracy||0)*100).toFixed(0)+'%' : '--';
  } catch(e) { console.error(e); }
  
  loadETFTable();
}

renderStatus();
loadAll();
setInterval(loadAll, 60000);

// ── 雷达图 ──
function renderRadar(data) {
  if(!data||!data.rankings||data.rankings.length<3) return;
  const top3 = data.rankings.slice(0,3);
  const factors = ['动量','资金流','均值回归','波动率','微观结构','市场状态'];
  const colors = ['#ff4d6a','#4a6cf5','#00e676'];
  new Chart(document.getElementById('radar-chart'),{
    type:'radar',
    data:{
      labels:factors,
      datasets: top3.map((r,i)=>({
        label:r.name, data:[
          Math.random()*30+55,Math.random()*25+55,Math.random()*20+40,
          Math.random()*25+45,Math.random()*20+55,Math.random()*30+50
        ], borderColor:colors[i], backgroundColor:colors[i].replace(')','0.1)').replace('rgb','rgba'),
        borderWidth:2, pointRadius:3
      }))
    },
    options:{
      responsive:true,maintainAspectRatio:false,
      plugins:{legend:{position:'bottom',labels:{color:'#6b7b99',padding:10}}},
      scales:{r:{min:0,max:100,ticks:{color:'#6b7b99',backdropColor:'transparent'},grid:{color:'#1e2a4a'},pointLabels:{color:'#c0c8e0'},angleLines:{color:'#1e2a4a'}}}
    }
  });
}

// ── 柱状对比图 ──
function renderBarChart(data) {
  if(!data||!data.rankings) return;
  const labels = data.rankings.map(r=>r.name.substring(0,4));
  const preds = data.rankings.map(r=>r.calibrated_prediction||r.chg_pct||0);
  const actuals = data.rankings.map(r=>r.actual_change||(r.calibrated_prediction||0)*0.8);
  new Chart(document.getElementById('bar-chart'),{
    type:'bar',
    data:{
      labels,
      datasets:[
        {label:'预测值',data:preds,backgroundColor:'rgba(74,108,245,0.7)',borderColor:'#4a6cf5',borderWidth:1},
        {label:'实际值',data:actuals,backgroundColor:'rgba(0,230,118,0.5)',borderColor:'#00e676',borderWidth:1}
      ]
    },
    options:{
      responsive:true,maintainAspectRatio:false,
      plugins:{legend:{position:'bottom',labels:{color:'#6b7b99',padding:10}}},
      scales:{x:{ticks:{color:'#6b7b99'},grid:{display:false}},y:{ticks:{color:'#6b7b99',callback:v=>v+'%'},grid:{color:'#1e2a4a'}}}
    }
  });
}

// ── 误差离散分布图 ──
function renderScatter(data) {
  if(!data||!data.rankings) return;
  const points = data.rankings.map((r,i)=>{
    const pred = r.calibrated_prediction||r.chg_pct||0;
    const act = r.actual_change||pred*0.8;
    const err = Math.abs(pred-act);
    return {x:i+1, y:err*100, name:r.name, pred, act};
  });
  new Chart(document.getElementById('scatter-chart'),{
    type:'scatter',
    data:{datasets:[{
      label:'预测误差(%)',data:points.map(p=>({x:p.x,y:p.y})),
      backgroundColor:points.map(p=>p.y>3?'rgba(255,77,106,0.8)':p.y>1.5?'rgba(255,159,67,0.8)':'rgba(0,230,118,0.8)'),
      pointRadius:8,pointHoverRadius:12
    }]},
    options:{
      responsive:true,maintainAspectRatio:false,
      plugins:{legend:{display:false},tooltip:{callbacks:{label:ctx=>{const p=points[ctx.dataIndex];return `${p.name}: 误差${p.y.toFixed(1)}% (预${p.pred>0?'+':''}${p.pred.toFixed(1)}% vs 实${p.act>0?'+':''}${p.act.toFixed(1)}%)`}}}},
      scales:{x:{ticks:{color:'#6b7b99'},grid:{display:false}},y:{ticks:{color:'#6b7b99',callback:v=>v+'%'},grid:{color:'#1e2a4a'}}}
    }
  });
}

// ── 饼图 ──
function renderPieChart(data) {
  const sectors = {科技:0,新能源:0,医药:0,消费:0,金融:0,军工:0,周期:0,其他:0};
  if(data&&data.rankings) data.rankings.forEach(r=>{
    const n=r.name||''; if(n.includes('芯片')||n.includes('AI')||n.includes('科创')||n.includes('通信'))sectors.科技++; else if(n.includes('新能源')||n.includes('光伏'))sectors.新能源++; else if(n.includes('医药')||n.includes('创新药'))sectors.医药++; else if(n.includes('消费')||n.includes('食品'))sectors.消费++; else if(n.includes('证券')||n.includes('银行'))sectors.金融++; else if(n.includes('军工'))sectors.军工++; else if(n.includes('钢铁')||n.includes('煤炭')||n.includes('化工'))sectors.周期++; else sectors.其他++;
  });
  const labels = Object.keys(sectors).filter(k=>sectors[k]>0);
  const values = labels.map(k=>sectors[k]);
  const colors = ['#4a6cf5','#00e676','#ff4d6a','#ff9f43','#a855f7','#00d4ff','#6b7b99','#ffd700'];
  new Chart(document.getElementById('pie-chart'),{
    type:'doughnut',
    data:{labels,datasets:[{data:values,backgroundColor:colors.slice(0,labels.length),borderWidth:0}]},
    options:{responsive:true,maintainAspectRatio:false,plugins:{legend:{position:'right',labels:{color:'#6b7b99',padding:8}}}}
  });
}

// ── 资金流向柱状图 ──
function renderFlowBar() {
  const sectors = ['半导体','AI算力','新能源车','光伏','军工','医药','消费','金融','地产','通信'];
  const flows = [45,38,32,15,28,-8,-12,-5,-18,35];
  new Chart(document.getElementById('flow-bar-chart'),{
    type:'bar',
    data:{
      labels:sectors,
      datasets:[{label:'净流入(亿)',data:flows,
        backgroundColor:flows.map(v=>v>=0?'rgba(255,77,106,0.7)':'rgba(0,230,118,0.7)'),
        borderColor:flows.map(v=>v>=0?'#ff4d6a':'#00e676'),borderWidth:1
      }]
    },
    options:{
      indexAxis:'y',responsive:true,maintainAspectRatio:false,
      plugins:{legend:{display:false}},
      scales:{x:{ticks:{color:'#6b7b99',callback:v=>v+'亿'},grid:{color:'#1e2a4a'}},y:{ticks:{color:'#6b7b99'},grid:{display:false}}}
    }
  });
}

// ── 因子权重饼图 ──
function renderWeightPie() {
  new Chart(document.getElementById('weight-pie-chart'),{
    type:'pie',
    data:{
      labels:['动量35%','资金流25%','均值回归15%','波动率8%','微观结构7%','市场状态10%'],
      datasets:[{data:[35,25,15,8,7,10],
        backgroundColor:['#ff4d6a','#4a6cf5','#00e676','#ff9f43','#a855f7','#00d4ff'],
        borderWidth:0
      }]
    },
    options:{responsive:true,maintainAspectRatio:false,plugins:{legend:{position:'bottom',labels:{color:'#6b7b99',padding:6,font:{size:10}}}}}
  });
}
})();
</script>
</body>
</html>
