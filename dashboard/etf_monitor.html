<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ETF监测中心 - 九章量化局</title>
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.4/dist/chart.umd.min.js"></script>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: 'Segoe UI', 'Microsoft YaHei', sans-serif;
    background: #0a0e27;
    color: #e0e6ff;
    min-height: 100vh;
  }
  :root {
    --up: #ff4d6a; --down: #00e676; --flat: #6b7b99;
    --blue: #4a6cf5; --cyan: #00d4ff; --purple: #a855f7;
    --orange: #ff9f43; --pink: #ff6b9d;
    --bg-card: #121630; --border: #1e264a;
  }
  .header {
    background: linear-gradient(135deg, #1a1f4a 0%, #2a1f5a 100%);
    border-bottom: 2px solid var(--blue);
    padding: 10px 20px;
    display: flex; justify-content: space-between; align-items: center;
    position: sticky; top: 0; z-index: 100;
  }
  .header h1 { font-size: 1.2rem; color: #7b9cff; letter-spacing: 2px; }
  .nav-tabs { display: flex; gap: 10px; margin-left: 20px; }
  .nav-tab {
    padding: 6px 14px; background: #1a1f4a; border: 1px solid #2a3f6a;
    border-radius: 5px; cursor: pointer; font-size: 0.8rem; color: #6b7b99;
    text-decoration: none; transition: all 0.3s;
  }
  .nav-tab:hover { background: #2a3f6a; color: #7b9cff; }
  .nav-tab.active { background: #2a3f6a; color: #7b9cff; border-color: #4a6cf5; }

  .container { max-width: 1600px; margin: 0 auto; padding: 20px; }
  
  /* 折叠面板 */
  .collapsible {
    background: var(--bg-card); border: 1px solid var(--border);
    border-radius: 10px; margin-bottom: 16px; overflow: hidden;
  }
  .collapsible-header {
    padding: 12px 16px; cursor: pointer; display: flex;
    justify-content: space-between; align-items: center;
    background: linear-gradient(135deg, #1a1f4a 0%, #121630 100%);
    border-bottom: 1px solid var(--border);
  }
  .collapsible-header:hover { background: #1a2a5a; }
  .collapsible-header h3 {
    font-size: 0.9rem; color: var(--cyan); display: flex;
    align-items: center; gap: 8px;
  }
  .collapsible-header .toggle {
    font-size: 1.2rem; color: #6b7b99; transition: transform 0.3s;
  }
  .collapsible-header .toggle.collapsed { transform: rotate(-90deg); }
  .collapsible-content {
    padding: 16px; max-height: 2000px; overflow: hidden;
    transition: max-height 0.3s ease, padding 0.3s ease;
  }
  .collapsible-content.collapsed {
    max-height: 0; padding: 0 16px;
  }
  
  /* 放大缩小按钮 */
  .zoom-controls {
    display: flex; gap: 5px; margin-left: auto;
  }
  .zoom-btn {
    padding: 4px 8px; background: #1a1f4a; border: 1px solid #2a3f6a;
    border-radius: 4px; cursor: pointer; font-size: 0.8rem; color: #6b7b99;
    transition: all 0.3s;
  }
  .zoom-btn:hover { background: #2a3f6a; color: #7b9cff; }
  
  /* 刷新按钮 */
  .refresh-btn {
    padding: 6px 14px; background: var(--blue); border: none;
    border-radius: 5px; cursor: pointer; font-size: 0.8rem; color: white;
    transition: all 0.3s; display: flex; align-items: center; gap: 6px;
  }
  .refresh-btn:hover { background: #3a5ce5; }
  .refresh-btn.loading { opacity: 0.7; cursor: not-allowed; }
  .refresh-btn .spinner {
    width: 14px; height: 14px; border: 2px solid rgba(255,255,255,0.3);
    border-top-color: white; border-radius: 50%;
    animation: spin 1s linear infinite; display: none;
  }
  .refresh-btn.loading .spinner { display: block; }
  @keyframes spin { to { transform: rotate(360deg); } }
  
  /* 指标卡片 */
  .metric-grid {
    display: grid; grid-template-columns: repeat(4, 1fr); gap: 16px; margin-bottom: 20px;
  }
  .metric-card {
    background: linear-gradient(135deg, #1a1f4a 0%, #121630 100%);
    border: 1px solid var(--border); border-radius: 10px;
    padding: 16px; text-align: center;
  }
  .metric-value { font-size: 1.8rem; font-weight: bold; color: var(--cyan); }
  .metric-label { font-size: 0.75rem; color: #6b7b99; margin-top: 4px; }
  .metric-change { font-size: 0.8rem; margin-top: 6px; }
  .metric-up { color: var(--up); }
  .metric-down { color: var(--down); }
  
  /* 筛选器 */
  .filter-bar {
    display: flex; gap: 10px; align-items: center; margin-bottom: 20px;
    flex-wrap: wrap;
  }
  .filter-btn {
    padding: 6px 14px; background: #1a1f4a; border: 1px solid #2a3f6a;
    border-radius: 5px; cursor: pointer; font-size: 0.8rem; color: #6b7b99;
    transition: all 0.3s;
  }
  .filter-btn:hover { background: #2a3f6a; color: #7b9cff; }
  .filter-btn.active { background: var(--blue); color: white; border-color: var(--blue); }
  
  .search-input {
    padding: 6px 12px; background: #1a1f4a; border: 1px solid #2a3f6a;
    border-radius: 5px; color: #c0c8e0; font-size: 0.8rem; width: 200px;
  }
  .search-input:focus { outline: none; border-color: var(--blue); }
  
  /* 自选按钮 */
  .watchlist-btn {
    padding: 4px 8px; background: transparent; border: 1px solid var(--orange);
    border-radius: 4px; cursor: pointer; font-size: 0.7rem; color: var(--orange);
    transition: all 0.3s;
  }
  .watchlist-btn:hover { background: var(--orange); color: #0a0e27; }
  .watchlist-btn.active { background: var(--orange); color: #0a0e27; }
  
  /* ETF表格 */
  .etf-table {
    width: 100%; border-collapse: collapse; font-size: 0.85rem;
  }
  .etf-table th {
    background: #1a1f4a; color: #6b7b99; padding: 10px 8px;
    text-align: left; border-bottom: 2px solid var(--border);
    cursor: pointer; user-select: none; position: sticky; top: 0;
  }
  .etf-table th:hover { color: var(--cyan); }
  .etf-table td {
    padding: 8px; border-bottom: 1px solid var(--border);
  }
  .etf-table tr:hover { background: #1a1f4a33; }
  .etf-table .rank { color: var(--blue); font-weight: bold; }
  .etf-table .up { color: var(--up); }
  .etf-table .down { color: var(--down); }
  .etf-table .code { font-family: 'Courier New', monospace; }
  
  /* 表格容器（可滚动） */
  .table-container {
    max-height: 500px; overflow-y: auto; border-radius: 8px;
  }
  .table-container::-webkit-scrollbar { width: 6px; }
  .table-container::-webkit-scrollbar-track { background: #0a0e27; }
  .table-container::-webkit-scrollbar-thumb { background: #2a3f6a; border-radius: 3px; }
  
  /* 图表容器 */
  .chart-container { position: relative; height: 300px; }
  .chart-container.small { height: 200px; }
  
  /* 标签页 */
  .tabs { display: flex; gap: 5px; margin-bottom: 15px; }
  .tab {
    padding: 6px 12px; background: #1a1f4a; border: 1px solid #2a3f6a;
    border-radius: 5px; cursor: pointer; font-size: 0.8rem; color: #6b7b99;
    transition: all 0.3s;
  }
  .tab:hover { background: #2a3f6a; color: #7b9cff; }
  .tab.active { background: var(--blue); color: white; border-color: var(--blue); }
  
  /* ETF管理弹窗 */
  .modal {
    display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%;
    background: rgba(0,0,0,0.7); z-index: 1000; justify-content: center; align-items: center;
  }
  .modal.active { display: flex; }
  .modal-content {
    background: var(--bg-card); border: 1px solid var(--border);
    border-radius: 10px; padding: 24px; width: 600px; max-height: 80vh;
    overflow-y: auto;
  }
  .modal-header {
    display: flex; justify-content: space-between; align-items: center;
    margin-bottom: 20px; padding-bottom: 10px; border-bottom: 1px solid var(--border);
  }
  .modal-header h2 { color: var(--cyan); font-size: 1.1rem; }
  .modal-close {
    background: none; border: none; color: #6b7b99; font-size: 1.5rem;
    cursor: pointer; padding: 0 5px;
  }
  .modal-close:hover { color: var(--up); }
  
  .form-group { margin-bottom: 15px; }
  .form-label { font-size: 0.8rem; color: #6b7b99; margin-bottom: 6px; display: block; }
  .form-input {
    width: 100%; padding: 8px 12px; background: #1a1f4a; border: 1px solid #2a3f6a;
    border-radius: 5px; color: #c0c8e0; font-size: 0.85rem;
  }
  .form-input:focus { outline: none; border-color: var(--blue); }
  
  .btn {
    padding: 8px 16px; border: none; border-radius: 5px;
    cursor: pointer; font-size: 0.85rem; transition: all 0.3s;
  }
  .btn-primary { background: var(--blue); color: white; }
  .btn-primary:hover { background: #3a5ce5; }
  .btn-secondary { background: #1a1f4a; color: #6b7b99; border: 1px solid #2a3f6a; }
  .btn-secondary:hover { background: #2a3f6a; color: #7b9cff; }
  .btn-danger { background: var(--up); color: white; }
  .btn-danger:hover { background: #e63a55; }
  
  /* 搜索结果 */
  .search-results {
    max-height: 200px; overflow-y: auto; border: 1px solid var(--border);
    border-radius: 5px; margin-top: 10px;
  }
  .search-item {
    padding: 8px 12px; cursor: pointer; display: flex;
    justify-content: space-between; align-items: center;
    border-bottom: 1px solid var(--border);
  }
  .search-item:hover { background: #1a1f4a; }
  .search-item .code { color: var(--blue); font-family: monospace; }
  .search-item .name { color: #c0c8e0; }
  .search-item .add-btn {
    padding: 4px 8px; background: var(--blue); border: none;
    border-radius: 4px; cursor: pointer; font-size: 0.7rem; color: white;
  }
  
  /* 数据源状态 */
  .data-source {
    display: flex; align-items: center; gap: 8px;
    font-size: 0.75rem; color: #6b7b99;
  }
  .data-source .dot {
    width: 8px; height: 8px; border-radius: 50%;
    background: var(--down); box-shadow: 0 0 6px var(--down);
  }
  .data-source .dot.offline { background: var(--up); box-shadow: 0 0 6px var(--up); }
</style>
</head>
<body>
<div class="header">
  <h1>⬡ 九章量化局 · ETF监测中心</h1>
  <div style="display: flex; align-items: center; gap: 20px;">
    <div class="nav-tabs">
      <a href="dashboard.html" class="nav-tab">📊 预测看板</a>
      <a href="lobster_collab.html" class="nav-tab">🦞 龙虾协同</a>
      <a href="backtest.html" class="nav-tab">📈 回测验证</a>
      <a href="topology.html" class="nav-tab">🔗 拓扑分析</a>
      <a href="history.html" class="nav-tab">📁 历史数据</a>
      <a href="etf_monitor.html" class="nav-tab active">📊 ETF监测</a>
    </div>
    <div style="display: flex; align-items: center; gap: 15px;">
      <div class="data-source">
        <span class="dot" id="data-dot"></span>
        <span id="data-status">数据源：通达信</span>
      </div>
      <button class="refresh-btn" id="refresh-btn" onclick="refreshData()">
        <span class="spinner"></span>
        🔄 刷新数据
      </button>
      <span style="font-size: 0.8rem; color: #6b7b99;" id="clock">--:--:--</span>
    </div>
  </div>
</div>

<div class="container">
  
  <!-- 市场概览（可折叠） -->
  <div class="collapsible" id="section-metrics">
    <div class="collapsible-header" onclick="toggleSection('metrics')">
      <h3><span>📊</span> 市场概览</h3>
      <div style="display: flex; align-items: center; gap: 10px;">
        <div class="zoom-controls">
          <button class="zoom-btn" onclick="event.stopPropagation(); zoomSection('metrics', 'out')">−</button>
          <button class="zoom-btn" onclick="event.stopPropagation(); zoomSection('metrics', 'in')">+</button>
        </div>
        <span class="toggle" id="toggle-metrics">▼</span>
      </div>
    </div>
    <div class="collapsible-content" id="content-metrics">
      <div class="metric-grid" id="metrics-grid">
        <!-- 动态填充 -->
      </div>
    </div>
  </div>
  
  <!-- 筛选器 -->
  <div class="filter-bar">
    <input type="text" class="search-input" id="search-input" placeholder="搜索ETF代码或名称..." oninput="renderRankings()">
    <button class="filter-btn active" data-market="all" onclick="filterMarket('all')">全部</button>
    <button class="filter-btn" data-market="a_share" onclick="filterMarket('a_share')">A股</button>
    <button class="filter-btn" data-market="us" onclick="filterMarket('us')">美股</button>
    <button class="filter-btn" data-market="watchlist" onclick="filterMarket('watchlist')">⭐ 自选</button>
    <div style="margin-left: auto; display: flex; gap: 10px;">
      <select id="sort-select" onchange="renderRankings()" style="padding: 6px 12px; background: #1a1f4a; border: 1px solid #2a3f6a; border-radius: 5px; color: #c0c8e0; font-size: 0.8rem;">
        <option value="change_pct">涨跌幅排序</option>
        <option value="volume">成交量排序</option>
        <option value="amount">成交额排序</option>
        <option value="turnover_rate">换手率排序</option>
      </select>
      <button class="btn btn-primary" onclick="openManageModal()">⚙️ 管理监测范围</button>
    </div>
  </div>
  
  <!-- 自选ETF榜单（可折叠） -->
  <div class="collapsible" id="section-watchlist">
    <div class="collapsible-header" onclick="toggleSection('watchlist')">
      <h3><span>⭐</span> 自选ETF榜单</h3>
      <div style="display: flex; align-items: center; gap: 10px;">
        <div class="zoom-controls">
          <button class="zoom-btn" onclick="event.stopPropagation(); zoomSection('watchlist', 'out')">−</button>
          <button class="zoom-btn" onclick="event.stopPropagation(); zoomSection('watchlist', 'in')">+</button>
        </div>
        <span class="toggle" id="toggle-watchlist">▼</span>
      </div>
    </div>
    <div class="collapsible-content" id="content-watchlist">
      <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 20px;">
        <div>
          <h4 style="color: #6b7b99; font-size: 0.8rem; margin-bottom: 10px;">A股自选</h4>
          <div class="table-container">
            <table class="etf-table">
              <thead>
                <tr>
                  <th>#</th><th>代码</th><th>名称</th><th>最新价</th><th>涨跌幅</th><th>操作</th>
                </tr>
              </thead>
              <tbody id="watchlist-a-share"></tbody>
            </table>
          </div>
        </div>
        <div>
          <h4 style="color: #6b7b99; font-size: 0.8rem; margin-bottom: 10px;">美股/海外自选</h4>
          <div class="table-container">
            <table class="etf-table">
              <thead>
                <tr>
                  <th>#</th><th>代码</th><th>名称</th><th>最新价</th><th>涨跌幅</th><th>操作</th>
                </tr>
              </thead>
              <tbody id="watchlist-us"></tbody>
            </table>
          </div>
        </div>
      </div>
    </div>
  </div>
  
  <!-- ETF动态排名（可折叠） -->
  <div class="collapsible" id="section-rankings">
    <div class="collapsible-header" onclick="toggleSection('rankings')">
      <h3><span>🏆</span> ETF动态排名</h3>
      <div style="display: flex; align-items: center; gap: 10px;">
        <div class="zoom-controls">
          <button class="zoom-btn" onclick="event.stopPropagation(); zoomSection('rankings', 'out')">−</button>
          <button class="zoom-btn" onclick="event.stopPropagation(); zoomSection('rankings', 'in')">+</button>
        </div>
        <span class="toggle" id="toggle-rankings">▼</span>
      </div>
    </div>
    <div class="collapsible-content" id="content-rankings">
      <div class="tabs">
        <button class="tab active" onclick="switchTab('all', this)">全部ETF</button>
        <button class="tab" onclick="switchTab('top_gainers', this)">涨幅榜</button>
        <button class="tab" onclick="switchTab('top_losers', this)">跌幅榜</button>
        <button class="tab" onclick="switchTab('active', this)">活跃榜</button>
      </div>
      <div class="table-container" style="max-height: 600px;">
        <table class="etf-table">
          <thead>
            <tr>
              <th>排名</th><th>代码</th><th>名称</th><th>最新价</th><th>涨跌幅</th>
              <th>成交量</th><th>成交额</th><th>换手率</th><th>操作</th>
            </tr>
          </thead>
          <tbody id="etf-rankings"></tbody>
        </table>
      </div>
    </div>
  </div>
  
  <!-- 多维度图表（可折叠） -->
  <div class="collapsible" id="section-charts">
    <div class="collapsible-header" onclick="toggleSection('charts')">
      <h3><span>📈</span> 多维度分析</h3>
      <div style="display: flex; align-items: center; gap: 10px;">
        <div class="zoom-controls">
          <button class="zoom-btn" onclick="event.stopPropagation(); zoomSection('charts', 'out')">−</button>
          <button class="zoom-btn" onclick="event.stopPropagation(); zoomSection('charts', 'in')">+</button>
        </div>
        <span class="toggle" id="toggle-charts">▼</span>
      </div>
    </div>
    <div class="collapsible-content" id="content-charts">
      <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 20px;">
        <div class="card">
          <h3>行业涨跌幅分布</h3>
          <div class="chart-container"><canvas id="sectorChart"></canvas></div>
        </div>
        <div class="card">
          <h3>涨跌幅分布直方图</h3>
          <div class="chart-container"><canvas id="histogramChart"></canvas></div>
        </div>
        <div class="card">
          <h3>成交额TOP10</h3>
          <div class="chart-container"><canvas id="amountChart"></canvas></div>
        </div>
        <div class="card">
          <h3>换手率TOP10</h3>
          <div class="chart-container"><canvas id="turnoverChart"></canvas></div>
        </div>
        <div class="card">
          <h3>行业资金流向</h3>
          <div class="chart-container"><canvas id="flowChart"></canvas></div>
        </div>
        <div class="card">
          <h3>市场情绪指标</h3>
          <div class="chart-container"><canvas id="sentimentChart"></canvas></div>
        </div>
      </div>
    </div>
  </div>
  
</div>

<!-- ETF管理弹窗 -->
<div class="modal" id="manage-modal">
  <div class="modal-content">
    <div class="modal-header">
      <h2>⚙️ 管理监测范围</h2>
      <button class="modal-close" onclick="closeManageModal()">×</button>
    </div>
    
    <div class="form-group">
      <label class="form-label">搜索全市场ETF（共1563只）</label>
      <input type="text" class="form-input" id="etf-search" placeholder="输入代码或名称搜索..." oninput="searchETFs()">
      <div class="search-results" id="search-results"></div>
    </div>
    
    <div class="form-group">
      <label class="form-label">当前监测范围</label>
      <div id="current-watchlist" style="max-height: 300px; overflow-y: auto;"></div>
    </div>
    
    <div style="display: flex; gap: 10px; justify-content: flex-end;">
      <button class="btn btn-secondary" onclick="closeManageModal()">关闭</button>
    </div>
  </div>
</div>

<script>
// 全局变量
let allETFs = [];
let watchlistData = { a_share: [], us: [] };
let currentFilter = 'all';
let charts = {};
let refreshTimer = null;
let sectionZoom = { metrics: 1, watchlist: 1, rankings: 1, charts: 1 };

// 初始化
document.addEventListener('DOMContentLoaded', function() {
  loadData();
  updateClock();
  setInterval(updateClock, 1000);
  // 自动刷新（30秒）
  refreshTimer = setInterval(loadData, 30000);
});

function updateClock() {
  document.getElementById('clock').textContent = new Date().toLocaleTimeString('zh-CN');
}

// 折叠/展开
function toggleSection(section) {
  const content = document.getElementById(`content-${section}`);
  const toggle = document.getElementById(`toggle-${section}`);
  content.classList.toggle('collapsed');
  toggle.classList.toggle('collapsed');
}

// 放大缩小
function zoomSection(section, direction) {
  const content = document.getElementById(`content-${section}`);
  if (direction === 'in') {
    sectionZoom[section] = Math.min(2, sectionZoom[section] + 0.1);
  } else {
    sectionZoom[section] = Math.max(0.5, sectionZoom[section] - 0.1);
  }
  content.style.transform = `scale(${sectionZoom[section]})`;
  content.style.transformOrigin = 'top left';
}

// 刷新数据
async function refreshData() {
  const btn = document.getElementById('refresh-btn');
  btn.classList.add('loading');
  
  try {
    const res = await fetch('/api/etf/refresh');
    const data = await res.json();
    if (data.success) {
      await loadData();
      document.getElementById('data-dot').className = 'dot';
      document.getElementById('data-status').textContent = `数据已更新 (${data.count}只ETF)`;
    }
  } catch (err) {
    console.error('刷新失败:', err);
    document.getElementById('data-dot').className = 'dot offline';
    document.getElementById('data-status').textContent = '刷新失败';
  }
  
  setTimeout(() => {
    btn.classList.remove('loading');
  }, 1000);
}

async function loadData() {
  try {
    const [rankingsRes, watchlistRes] = await Promise.all([
      fetch('/api/etf/rankings?market=all&sort=change_pct&top=100'),
      fetch('/api/etf/watchlist')
    ]);
    
    allETFs = await rankingsRes.json();
    watchlistData = await watchlistRes.json();
    
    renderMetrics();
    renderWatchlist();
    renderRankings();
    renderCharts();
    
    document.getElementById('data-dot').className = 'dot';
    document.getElementById('data-status').textContent = `数据源：通达信 (${allETFs.length}只)`;
  } catch (err) {
    console.error('加载数据失败:', err);
    document.getElementById('data-dot').className = 'dot offline';
    document.getElementById('data-status').textContent = '数据加载失败';
  }
}

function renderMetrics() {
  const grid = document.getElementById('metrics-grid');
  const total = allETFs.length;
  const upCount = allETFs.filter(e => e.change_pct > 0).length;
  const downCount = allETFs.filter(e => e.change_pct < 0).length;
  const avgChange = allETFs.reduce((sum, e) => sum + e.change_pct, 0) / total;
  
  grid.innerHTML = `
    <div class="metric-card">
      <div class="metric-value">${total}</div>
      <div class="metric-label">监测ETF总数</div>
    </div>
    <div class="metric-card">
      <div class="metric-value" style="color: var(--up);">${upCount}</div>
      <div class="metric-label">上涨数量</div>
      <div class="metric-change metric-up">${(upCount/total*100).toFixed(1)}%</div>
    </div>
    <div class="metric-card">
      <div class="metric-value" style="color: var(--down);">${downCount}</div>
      <div class="metric-label">下跌数量</div>
      <div class="metric-change metric-down">${(downCount/total*100).toFixed(1)}%</div>
    </div>
    <div class="metric-card">
      <div class="metric-value ${avgChange >= 0 ? 'metric-up' : 'metric-down'}">${avgChange >= 0 ? '+' : ''}${avgChange.toFixed(2)}%</div>
      <div class="metric-label">平均涨跌幅</div>
    </div>
  `;
}

function renderWatchlist() {
  const aShareBody = document.getElementById('watchlist-a-share');
  aShareBody.innerHTML = watchlistData.a_share.map((etf, i) => `
    <tr>
      <td class="rank">${i + 1}</td>
      <td class="code">${etf.code}</td>
      <td>${etf.name}</td>
      <td>${etf.price.toFixed(3)}</td>
      <td class="${etf.change_pct >= 0 ? 'up' : 'down'}">${etf.change_pct >= 0 ? '+' : ''}${etf.change_pct.toFixed(2)}%</td>
      <td><button class="watchlist-btn active" onclick="removeWatchlist('${etf.code}', 'a_share')">取消</button></td>
    </tr>
  `).join('');
  
  const usBody = document.getElementById('watchlist-us');
  usBody.innerHTML = watchlistData.us.map((etf, i) => `
    <tr>
      <td class="rank">${i + 1}</td>
      <td class="code">${etf.code}</td>
      <td>${etf.name}</td>
      <td>${etf.price.toFixed(3)}</td>
      <td class="${etf.change_pct >= 0 ? 'up' : 'down'}">${etf.change_pct >= 0 ? '+' : ''}${etf.change_pct.toFixed(2)}%</td>
      <td><button class="watchlist-btn active" onclick="removeWatchlist('${etf.code}', 'us')">取消</button></td>
    </tr>
  `).join('');
}

function renderRankings() {
  let filtered = [...allETFs];
  
  if (currentFilter === 'a_share') {
    filtered = filtered.filter(e => e.market === 'SH' || e.market === 'SZ' || e.market === '1' || e.market === '0');
  } else if (currentFilter === 'us') {
    filtered = filtered.filter(e => e.market !== 'SH' && e.market !== 'SZ' && e.market !== '1' && e.market !== '0');
  } else if (currentFilter === 'watchlist') {
    const watchlistCodes = [...watchlistData.a_share.map(e => e.code), ...watchlistData.us.map(e => e.code)];
    filtered = filtered.filter(e => watchlistCodes.includes(e.code));
  }
  
  const search = document.getElementById('search-input').value.toLowerCase();
  if (search) {
    filtered = filtered.filter(e => e.code.includes(search) || e.name.toLowerCase().includes(search));
  }
  
  const sortField = document.getElementById('sort-select').value;
  filtered.sort((a, b) => b[sortField] - a[sortField]);
  
  const body = document.getElementById('etf-rankings');
  body.innerHTML = filtered.slice(0, 100).map((etf, i) => {
    const isWatchlist = watchlistData.a_share.some(w => w.code === etf.code) || 
                       watchlistData.us.some(w => w.code === etf.code);
    return `
      <tr>
        <td class="rank">${i + 1}</td>
        <td class="code">${etf.code}</td>
        <td>${etf.name}</td>
        <td>${etf.price.toFixed(3)}</td>
        <td class="${etf.change_pct >= 0 ? 'up' : 'down'}">${etf.change_pct >= 0 ? '+' : ''}${etf.change_pct.toFixed(2)}%</td>
        <td>${(etf.volume / 10000).toFixed(0)}万</td>
        <td>${(etf.amount / 100000000).toFixed(2)}亿</td>
        <td>${etf.turnover_rate.toFixed(2)}%</td>
        <td>
          <button class="watchlist-btn ${isWatchlist ? 'active' : ''}" 
                  onclick="toggleWatchlist('${etf.code}', '${etf.name}', '${etf.market}')">
            ${isWatchlist ? '取消' : '自选'}
          </button>
        </td>
      </tr>
    `;
  }).join('');
}

function renderCharts() {
  renderSectorChart();
  renderHistogramChart();
  renderAmountChart();
  renderTurnoverChart();
  renderFlowChart();
  renderSentimentChart();
}

function renderSectorChart() {
  const sectors = {};
  allETFs.forEach(etf => {
    const sector = getSector(etf.name);
    if (!sectors[sector]) sectors[sector] = [];
    sectors[sector].push(etf.change_pct);
  });
  
  const labels = Object.keys(sectors);
  const data = labels.map(s => {
    const values = sectors[s];
    return values.reduce((sum, v) => sum + v, 0) / values.length;
  });
  
  if (charts.sector) charts.sector.destroy();
  charts.sector = new Chart(document.getElementById('sectorChart'), {
    type: 'bar',
    data: {
      labels: labels,
      datasets: [{
        label: '平均涨跌幅',
        data: data,
        backgroundColor: data.map(v => v >= 0 ? 'rgba(255,77,106,0.7)' : 'rgba(0,230,118,0.7)'),
        borderColor: data.map(v => v >= 0 ? '#ff4d6a' : '#00e676'),
        borderWidth: 1
      }]
    },
    options: {
      responsive: true, maintainAspectRatio: false,
      plugins: { legend: { display: false } },
      scales: {
        x: { ticks: { color: '#6b7b99', font: { size: 10 } }, grid: { display: false } },
        y: { ticks: { color: '#6b7b99' }, grid: { color: '#1e264a' } }
      }
    }
  });
}

function renderHistogramChart() {
  const ranges = ['-5以下', '-5~-3', '-3~-1', '-1~0', '0~1', '1~3', '3~5', '5以上'];
  const counts = [0, 0, 0, 0, 0, 0, 0, 0];
  
  allETFs.forEach(etf => {
    const v = etf.change_pct;
    if (v < -5) counts[0]++;
    else if (v < -3) counts[1]++;
    else if (v < -1) counts[2]++;
    else if (v < 0) counts[3]++;
    else if (v < 1) counts[4]++;
    else if (v < 3) counts[5]++;
    else if (v < 5) counts[6]++;
    else counts[7]++;
  });
  
  if (charts.histogram) charts.histogram.destroy();
  charts.histogram = new Chart(document.getElementById('histogramChart'), {
    type: 'bar',
    data: {
      labels: ranges,
      datasets: [{
        label: 'ETF数量',
        data: counts,
        backgroundColor: ranges.map((_, i) => i < 4 ? 'rgba(0,230,118,0.7)' : 'rgba(255,77,106,0.7)'),
        borderWidth: 0
      }]
    },
    options: {
      responsive: true, maintainAspectRatio: false,
      plugins: { legend: { display: false } },
      scales: {
        x: { ticks: { color: '#6b7b99' }, grid: { display: false } },
        y: { ticks: { color: '#6b7b99' }, grid: { color: '#1e264a' } }
      }
    }
  });
}

function renderAmountChart() {
  const top10 = [...allETFs].sort((a, b) => b.amount - a.amount).slice(0, 10);
  
  if (charts.amount) charts.amount.destroy();
  charts.amount = new Chart(document.getElementById('amountChart'), {
    type: 'bar',
    data: {
      labels: top10.map(e => e.name),
      datasets: [{
        label: '成交额(亿)',
        data: top10.map(e => (e.amount / 100000000).toFixed(2)),
        backgroundColor: 'rgba(74,108,245,0.7)',
        borderColor: '#4a6cf5',
        borderWidth: 1
      }]
    },
    options: {
      indexAxis: 'y', responsive: true, maintainAspectRatio: false,
      plugins: { legend: { display: false } },
      scales: {
        x: { ticks: { color: '#6b7b99' }, grid: { color: '#1e264a' } },
        y: { ticks: { color: '#6b7b99', font: { size: 10 } }, grid: { display: false } }
      }
    }
  });
}

function renderTurnoverChart() {
  const top10 = [...allETFs].sort((a, b) => b.turnover_rate - a.turnover_rate).slice(0, 10);
  
  if (charts.turnover) charts.turnover.destroy();
  charts.turnover = new Chart(document.getElementById('turnoverChart'), {
    type: 'bar',
    data: {
      labels: top10.map(e => e.name),
      datasets: [{
        label: '换手率(%)',
        data: top10.map(e => e.turnover_rate.toFixed(2)),
        backgroundColor: 'rgba(0,212,255,0.7)',
        borderColor: '#00d4ff',
        borderWidth: 1
      }]
    },
    options: {
      indexAxis: 'y', responsive: true, maintainAspectRatio: false,
      plugins: { legend: { display: false } },
      scales: {
        x: { ticks: { color: '#6b7b99' }, grid: { color: '#1e264a' } },
        y: { ticks: { color: '#6b7b99', font: { size: 10 } }, grid: { display: false } }
      }
    }
  });
}

function renderFlowChart() {
  const sectors = {};
  allETFs.forEach(etf => {
    const sector = getSector(etf.name);
    if (!sectors[sector]) sectors[sector] = 0;
    sectors[sector] += etf.amount;
  });
  
  const labels = Object.keys(sectors);
  const data = labels.map(s => (sectors[s] / 100000000).toFixed(2));
  
  if (charts.flow) charts.flow.destroy();
  charts.flow = new Chart(document.getElementById('flowChart'), {
    type: 'doughnut',
    data: {
      labels: labels,
      datasets: [{
        data: data,
        backgroundColor: ['#4a6cf5', '#00d4ff', '#a855f7', '#ff9f43', '#ff6b9d', '#00e676', '#ff4d6a', '#6b7b99'],
        borderWidth: 0
      }]
    },
    options: {
      responsive: true, maintainAspectRatio: false,
      plugins: { legend: { position: 'right', labels: { color: '#6b7b99', font: { size: 10 } } } }
    }
  });
}

function renderSentimentChart() {
  const upCount = allETFs.filter(e => e.change_pct > 0).length;
  const downCount = allETFs.filter(e => e.change_pct < 0).length;
  const flatCount = allETFs.filter(e => e.change_pct === 0).length;
  
  if (charts.sentiment) charts.sentiment.destroy();
  charts.sentiment = new Chart(document.getElementById('sentimentChart'), {
    type: 'doughnut',
    data: {
      labels: ['上涨', '下跌', '平盘'],
      datasets: [{
        data: [upCount, downCount, flatCount],
        backgroundColor: ['#ff4d6a', '#00e676', '#6b7b99'],
        borderWidth: 0
      }]
    },
    options: {
      responsive: true, maintainAspectRatio: false,
      plugins: { legend: { position: 'bottom', labels: { color: '#6b7b99', padding: 15 } } }
    }
  });
}

function getSector(name) {
  if (name.includes('半导体') || name.includes('芯片') || name.includes('AI') || name.includes('人工智能') || name.includes('科创')) return '科技';
  if (name.includes('新能源') || name.includes('光伏') || name.includes('锂电') || name.includes('新能车')) return '新能源';
  if (name.includes('医药') || name.includes('创新药') || name.includes('医疗') || name.includes('生科')) return '医药';
  if (name.includes('消费') || name.includes('食品') || name.includes('家电') || name.includes('酒')) return '消费';
  if (name.includes('银行') || name.includes('证券') || name.includes('金融') || name.includes('保险')) return '金融';
  if (name.includes('军工') || name.includes('国防')) return '军工';
  if (name.includes('地产') || name.includes('房地产') || name.includes('基建')) return '地产';
  if (name.includes('纳指') || name.includes('标普') || name.includes('恒生') || name.includes('中概') || name.includes('日经') || name.includes('德国') || name.includes('法国')) return '海外';
  return '其他';
}

function filterMarket(market) {
  currentFilter = market;
  document.querySelectorAll('.filter-btn').forEach(btn => {
    btn.classList.toggle('active', btn.dataset.market === market);
  });
  renderRankings();
}

function switchTab(tab, btn) {
  document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
  btn.classList.add('active');
  
  if (tab === 'top_gainers') {
    allETFs.sort((a, b) => b.change_pct - a.change_pct);
  } else if (tab === 'top_losers') {
    allETFs.sort((a, b) => a.change_pct - b.change_pct);
  } else if (tab === 'active') {
    allETFs.sort((a, b) => b.turnover_rate - a.turnover_rate);
  }
  renderRankings();
}

async function toggleWatchlist(code, name, market) {
  const isWatchlist = watchlistData.a_share.some(w => w.code === code) || 
                     watchlistData.us.some(w => w.code === code);
  
  if (isWatchlist) {
    const category = watchlistData.a_share.some(w => w.code === code) ? 'a_share' : 'us';
    await removeWatchlist(code, category);
  } else {
    await addWatchlist(code, name, market);
  }
}

async function addWatchlist(code, name, market) {
  try {
    await fetch('/api/etf/watchlist/add', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ code, name, market, category: 'a_share' })
    });
    await loadData();
  } catch (err) {
    console.error('添加自选失败:', err);
  }
}

async function removeWatchlist(code, category) {
  try {
    await fetch('/api/etf/watchlist/remove', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ code, market: category })
    });
    await loadData();
  } catch (err) {
    console.error('移除自选失败:', err);
  }
}

// ETF管理弹窗
function openManageModal() {
  document.getElementById('manage-modal').classList.add('active');
  renderCurrentWatchlist();
}

function closeManageModal() {
  document.getElementById('manage-modal').classList.remove('active');
}

function renderCurrentWatchlist() {
  const container = document.getElementById('current-watchlist');
  const all = [...watchlistData.a_share, ...watchlistData.us];
  
  container.innerHTML = all.map(etf => `
    <div style="display: flex; justify-content: space-between; align-items: center; padding: 8px; border-bottom: 1px solid var(--border);">
      <div>
        <span style="color: var(--blue); font-family: monospace;">${etf.code}</span>
        <span style="margin-left: 10px;">${etf.name}</span>
      </div>
      <button class="btn btn-danger" style="padding: 4px 8px; font-size: 0.75rem;" 
              onclick="removeWatchlist('${etf.code}', 'a_share'); renderCurrentWatchlist();">删除</button>
    </div>
  `).join('');
}

async function searchETFs() {
  const keyword = document.getElementById('etf-search').value;
  if (keyword.length < 2) {
    document.getElementById('search-results').innerHTML = '';
    return;
  }
  
  try {
    const res = await fetch(`/api/etf/search?q=${encodeURIComponent(keyword)}`);
    const results = await res.json();
    
    const container = document.getElementById('search-results');
    container.innerHTML = results.map(etf => `
      <div class="search-item">
        <div>
          <span class="code">${etf.code}</span>
          <span class="name" style="margin-left: 10px;">${etf.name}</span>
        </div>
        <button class="add-btn" onclick="addWatchlist('${etf.code}', '${etf.name}', '${etf.market}'); renderCurrentWatchlist();">添加</button>
      </div>
    `).join('');
  } catch (err) {
    console.error('搜索失败:', err);
  }
}
