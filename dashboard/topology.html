<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>拓扑分析 - 九章量化局</title>
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.4/dist/chart.umd.min.js"></script>
<link rel="stylesheet" href="static/theme.css">
<style>body{background:#070b1a;color:#e0e6ff;min-height:100vh;font-family:var(--font);}*{box-sizing:border-box;margin:0;padding:0}</style>
</head>
<body>
<nav class="header">
  <div style="display:flex;align-items:center;gap:12px;">
    <span style="font-size:1.4rem;">⬡</span>
    <h1>九章量化局</h1>
    <span style="font-size:0.7rem;color:var(--text-dim);background:rgba(0,212,255,0.15);padding:2px 8px;border-radius:4px;">拓扑分析</span>
  </div>
  <div style="display:flex;align-items:center;gap:20px;">
    <div class="nav-tabs" id="nav-bar"></div>
    <span style="font-size:0.85rem;font-weight:700;color:var(--cyan);" id="clock">--:--:--</span>
  </div>
</nav>

<div class="container has-tip" data-tip="🔗 拓扑分析 | 资金流向+行业热力+ETF相关性矩阵+因子IC滚动 | 风险消息关联拓扑">
  
  <!-- 核心指标 -->
  <div class="section-title">
    <span class="icon">📊</span> 核心指标
  </div>
  <div class="grid grid-4" id="metrics-grid">
    <!-- 动态填充 -->
  </div>
  
  <!-- 资金流向分析 -->
  <div class="section-title">
    <span class="icon">💰</span> 资金流向分析
  </div>
  <div class="grid grid-2">
    <div class="card">
      <h3>行业资金流向（今日净流入）</h3>
      <div id="sector-flow">
        <!-- 动态填充 -->
      </div>
    </div>
    <div class="card">
      <h3>资金流向趋势（近7日）</h3>
      <div class="chart-container">
        <canvas id="flowTrendChart"></canvas>
      </div>
    </div>
  </div>
  
  <!-- 行业轮动分析 -->
  <div class="section-title">
    <span class="icon">🔄</span> 行业轮动分析
  </div>
  <div class="grid grid-2">
    <div class="card">
      <h3>行业热度矩阵</h3>
      <div class="sector-grid" id="sector-heatmap">
        <!-- 动态填充 -->
      </div>
    </div>
    <div class="card">
      <h3>轮动周期图</h3>
      <div class="chart-container">
        <canvas id="rotationChart"></canvas>
      </div>
    </div>
  </div>
  
  <!-- 消息舆情分析 -->
  <div class="section-title">
    <span class="icon">📰</span> 消息舆情分析
  </div>
  <div class="grid grid-2">
    <div class="card">
      <h3>今日重要消息</h3>
      <div id="news-feed">
        <!-- 动态填充 -->
      </div>
    </div>
    <div class="card">
      <h3>舆情情绪指数</h3>
      <div class="chart-container">
        <canvas id="sentimentChart"></canvas>
      </div>
    </div>
  </div>
  
  <!-- v2.0: ETF相关性矩阵 -->
  <div class="section-title">
    <span class="icon">🔥</span> ETF相关性矩阵 <span style="font-size:0.7rem;color:#6b7b99;">(v2.0新增)</span>
  </div>
  <div class="card">
    <div id="correlation-matrix-topo" style="overflow-x:auto;margin-bottom:10px;"></div>
    <div style="font-size:0.75rem;color:#6b7b99;">🔴=高正相关 🔵=低相关 | 避免同时持有高相关ETF分散风险</div>
  </div>
  
  <!-- 风险/消息关联拓扑图 -->
  <div class="section-title">
    <span class="icon">⚠️</span> 风险-消息-ETF 关联拓扑
  </div>
  <div class="topology-container" style="margin-bottom: 20px;">
    <svg id="riskTopologySvg" width="100%" height="400" viewBox="0 0 1200 400">
      <!-- 动态生成 -->
    </svg>
  </div>
  
  <!-- 拓扑关系图 -->
  <div class="section-title">
    <span class="icon">🔗</span> 资金-行业-消息 拓扑关系
  </div>
  <div class="topology-container">
    <svg id="topologySvg" width="100%" height="500" viewBox="0 0 1200 500">
      <!-- 动态生成 -->
    </svg>
  </div>
  
</div>

<script>
// 模拟数据（实际使用时从API获取）
const mockData = {
  metrics: [
    { label: '北向资金', value: '+86.5亿', change: '+12.3%', up: true },
    { label: '融资余额', value: '1.85万亿', change: '+0.8%', up: true },
    { label: '市场情绪', value: '72', change: '偏多', up: true },
    { label: '轮动强度', value: '68', change: '中等', up: null }
  ],
  sectorFlow: [
    { name: '半导体', value: 45.2, unit: '亿' },
    { name: '新能源', value: 32.8, unit: '亿' },
    { name: '医药', value: -18.5, unit: '亿' },
    { name: '消费', value: -12.3, unit: '亿' },
    { name: '金融', value: 28.6, unit: '亿' },
    { name: '军工', value: 15.4, unit: '亿' }
  ],
  sectors: [
    { name: '半导体', value: 5.2, hot: true },
    { name: 'AI算力', value: 4.8, hot: true },
    { name: '新能源车', value: 3.5, hot: true },
    { name: '光伏', value: 2.1, hot: true },
    { name: '医药', value: -1.2, hot: false },
    { name: '消费', value: -0.8, hot: false },
    { name: '地产', value: -2.5, hot: false },
    { name: '银行', value: 0.5, hot: null }
  ],
  news: [
    { time: '09:15', content: '国务院常务会议强调加大半导体产业支持力度', impact: 'positive' },
    { time: '10:30', content: '央行开展1000亿元MLF操作，利率持平', impact: 'neutral' },
    { time: '13:45', content: '新能源汽车销量数据超预期，同比增长45%', impact: 'positive' },
    { time: '14:20', content: '美联储鹰派言论引发市场担忧', impact: 'negative' },
    { time: '15:00', content: '北向资金今日净买入86.5亿元', impact: 'positive' }
  ]
};

// 初始化
document.addEventListener('DOMContentLoaded', function() {
  renderMetrics();
  renderSectorFlow();
  renderSectorHeatmap();
  renderNewsFeed();
  renderFlowTrendChart();
  renderRotationChart();
  renderSentimentChart();
  renderRiskTopology();
  renderTopology();
  updateClock();
  setInterval(updateClock, 1000);
});

function updateClock() {
  const now = new Date();
  document.getElementById('clock').textContent = now.toLocaleTimeString('zh-CN');
}

function renderMetrics() {
  const grid = document.getElementById('metrics-grid');
  grid.innerHTML = mockData.metrics.map(m => `
    <div class="metric-card">
      <div class="metric-value">${m.value}</div>
      <div class="metric-label">${m.label}</div>
      <div class="metric-change ${m.up === true ? 'metric-up' : m.up === false ? 'metric-down' : ''}">${m.change}</div>
    </div>
  `).join('');
}

function renderSectorFlow() {
  const container = document.getElementById('sector-flow');
  container.innerHTML = mockData.sectorFlow.map(s => `
    <div class="flow-item">
      <span class="flow-name">${s.name}</span>
      <span class="flow-value ${s.value >= 0 ? 'flow-in' : 'flow-out'}">
        ${s.value >= 0 ? '+' : ''}${s.value}${s.unit}
      </span>
    </div>
  `).join('');
}

function renderSectorHeatmap() {
  const container = document.getElementById('sector-heatmap');
  container.innerHTML = mockData.sectors.map(s => `
    <div class="sector-item">
      <div class="sector-name">${s.name}</div>
      <div class="sector-value ${s.hot === true ? 'sector-hot' : s.hot === false ? 'sector-cold' : 'sector-neutral'}">
        ${s.value >= 0 ? '+' : ''}${s.value}%
      </div>
    </div>
  `).join('');
}

function renderNewsFeed() {
  const container = document.getElementById('news-feed');
  container.innerHTML = mockData.news.map(n => `
    <div class="news-item">
      <span class="news-time">${n.time}</span>
      <span class="news-content">
        ${n.content}
        <span class="news-impact impact-${n.impact}">${
          n.impact === 'positive' ? '利好' : 
          n.impact === 'negative' ? '利空' : '中性'
        }</span>
      </span>
    </div>
  `).join('');
}

function renderFlowTrendChart() {
  new Chart(document.getElementById('flowTrendChart'), {
    type: 'line',
    data: {
      labels: ['6/10', '6/11', '6/12', '6/13', '6/14', '6/15', '6/16'],
      datasets: [
        {
          label: '北向资金(亿)',
          data: [45, 62, -30, 78, 55, 90, 86],
          borderColor: '#4a6cf5',
          backgroundColor: 'rgba(74,108,245,0.1)',
          fill: true
        },
        {
          label: '融资净买入(亿)',
          data: [20, 35, 15, 42, 28, 55, 40],
          borderColor: '#00d4ff',
          backgroundColor: 'rgba(0,212,255,0.1)',
          fill: true
        }
      ]
    },
    options: {
      responsive: true,
      maintainAspectRatio: false,
      plugins: { legend: { labels: { color: '#6b7b99' } } },
      scales: {
        x: { ticks: { color: '#6b7b99' }, grid: { color: '#1e264a' } },
        y: { ticks: { color: '#6b7b99' }, grid: { color: '#1e264a' } }
      }
    }
  });
}

function renderRotationChart() {
  new Chart(document.getElementById('rotationChart'), {
    type: 'radar',
    data: {
      labels: ['半导体', 'AI算力', '新能源', '医药', '消费', '金融'],
      datasets: [
        {
          label: '本周热度',
          data: [92, 88, 75, 45, 38, 60],
          borderColor: '#4a6cf5',
          backgroundColor: 'rgba(74,108,245,0.2)'
        },
        {
          label: '上周热度',
          data: [78, 82, 80, 55, 42, 50],
          borderColor: '#a855f7',
          backgroundColor: 'rgba(168,85,247,0.2)'
        }
      ]
    },
    options: {
      responsive: true,
      maintainAspectRatio: false,
      plugins: { legend: { labels: { color: '#6b7b99' } } },
      scales: {
        r: {
          angleLines: { color: '#1e264a' },
          grid: { color: '#1e264a' },
          pointLabels: { color: '#c0c8e0' },
          ticks: { color: '#6b7b99', backdropColor: 'transparent' }
        }
      }
    }
  });
}

function renderSentimentChart() {
  new Chart(document.getElementById('sentimentChart'), {
    type: 'doughnut',
    data: {
      labels: ['乐观', '中性', '悲观'],
      datasets: [{
        data: [55, 30, 15],
        backgroundColor: ['#00e676', '#6b7b99', '#ff4d6a'],
        borderWidth: 0
      }]
    },
    options: {
      responsive: true,
      maintainAspectRatio: false,
      plugins: {
        legend: { position: 'bottom', labels: { color: '#6b7b99', padding: 15 } }
      }
    }
  });
}

function renderTopology() {
  const svg = document.getElementById('topologySvg');
  const width = 1200, height = 500;
  
  // 节点定义
  const nodes = [
    // 资金节点（左侧）
    { id: 'fund_north', label: '北向资金', x: 100, y: 100, type: 'fund', value: '+86.5亿' },
    { id: 'fund_margin', label: '融资资金', x: 100, y: 250, type: 'fund', value: '+40亿' },
    { id: 'fund_main', label: '主力资金', x: 100, y: 400, type: 'fund', value: '+52亿' },
    
    // 行业节点（中间）
    { id: 'sector_semi', label: '半导体', x: 500, y: 80, type: 'sector', value: '+5.2%' },
    { id: 'sector_ai', label: 'AI算力', x: 500, y: 200, type: 'sector', value: '+4.8%' },
    { id: 'sector_nev', label: '新能源', x: 500, y: 320, type: 'sector', value: '+3.5%' },
    { id: 'sector_med', label: '医药', x: 500, y: 440, type: 'sector', value: '-1.2%' },
    
    // 消息节点（右侧）
    { id: 'news_policy', label: '政策利好', x: 900, y: 100, type: 'news', value: '国务院' },
    { id: 'news_data', label: '数据超预期', x: 900, y: 250, type: 'news', value: '销量+45%' },
    { id: 'news_fed', label: '美联储鹰派', x: 900, y: 400, type: 'news', value: '利空' }
  ];
  
  // 连接定义
  const links = [
    // 资金 → 行业
    { from: 'fund_north', to: 'sector_semi', value: 30 },
    { from: 'fund_north', to: 'sector_ai', value: 25 },
    { from: 'fund_margin', to: 'sector_semi', value: 20 },
    { from: 'fund_margin', to: 'sector_nev', value: 15 },
    { from: 'fund_main', to: 'sector_ai', value: 28 },
    { from: 'fund_main', to: 'sector_nev', value: 18 },
    
    // 消息 → 行业
    { from: 'news_policy', to: 'sector_semi', value: 35 },
    { from: 'news_data', to: 'sector_nev', value: 30 },
    { from: 'news_fed', to: 'sector_med', value: 20 }
  ];
  
  // 绘制连接线
  links.forEach(link => {
    const from = nodes.find(n => n.id === link.from);
    const to = nodes.find(n => n.id === link.to);
    const opacity = Math.min(link.value / 35, 1);
    
    const line = document.createElementNS('http://www.w3.org/2000/svg', 'line');
    line.setAttribute('x1', from.x);
    line.setAttribute('y1', from.y);
    line.setAttribute('x2', to.x);
    line.setAttribute('y2', to.y);
    line.setAttribute('stroke', from.type === 'fund' ? '#4a6cf5' : '#ff9f43');
    line.setAttribute('stroke-width', link.value / 10);
    line.setAttribute('stroke-opacity', opacity);
    svg.appendChild(line);
  });
  
  // 绘制节点
  nodes.forEach(node => {
    const g = document.createElementNS('http://www.w3.org/2000/svg', 'g');
    
    // 节点圆圈
    const circle = document.createElementNS('http://www.w3.org/2000/svg', 'circle');
    circle.setAttribute('cx', node.x);
    circle.setAttribute('cy', node.y);
    circle.setAttribute('r', 30);
    circle.setAttribute('fill', node.type === 'fund' ? '#1a3a6a' : 
                                 node.type === 'sector' ? '#1a4a3a' : '#4a2a1a');
    circle.setAttribute('stroke', node.type === 'fund' ? '#4a6cf5' : 
                                   node.type === 'sector' ? '#00e676' : '#ff9f43');
    circle.setAttribute('stroke-width', 2);
    g.appendChild(circle);
    
    // 节点标签
    const text = document.createElementNS('http://www.w3.org/2000/svg', 'text');
    text.setAttribute('x', node.x);
    text.setAttribute('y', node.y - 5);
    text.setAttribute('text-anchor', 'middle');
    text.setAttribute('fill', '#e0e6ff');
    text.setAttribute('font-size', '11');
    text.textContent = node.label;
    g.appendChild(text);
    
    // 节点值
    const value = document.createElementNS('http://www.w3.org/2000/svg', 'text');
    value.setAttribute('x', node.x);
    value.setAttribute('y', node.y + 12);
    value.setAttribute('text-anchor', 'middle');
    value.setAttribute('fill', node.type === 'fund' ? '#4a6cf5' : 
                                node.type === 'sector' ? '#00e676' : '#ff9f43');
    value.setAttribute('font-size', '10');
    value.textContent = node.value;
    g.appendChild(value);
    
    svg.appendChild(g);
  });
  
  // 添加图例
  const legend = document.createElementNS('http://www.w3.org/2000/svg', 'g');
  legend.setAttribute('transform', 'translate(50, 480)');
  
  const legendItems = [
    { color: '#4a6cf5', label: '资金流' },
    { color: '#00e676', label: '行业' },
    { color: '#ff9f43', label: '消息' }
  ];
  
  legendItems.forEach((item, i) => {
    const circle = document.createElementNS('http://www.w3.org/2000/svg', 'circle');
    circle.setAttribute('cx', i * 120);
    circle.setAttribute('cy', 0);
    circle.setAttribute('r', 6);
    circle.setAttribute('fill', item.color);
    legend.appendChild(circle);
    
    const text = document.createElementNS('http://www.w3.org/2000/svg', 'text');
    text.setAttribute('x', i * 120 + 15);
    text.setAttribute('y', 5);
    text.setAttribute('fill', '#6b7b99');
    text.setAttribute('font-size', '12');
    text.textContent = item.label;
    legend.appendChild(text);
  });
  
  svg.appendChild(legend);
}

function renderRiskTopology() {
  const svg = document.getElementById('riskTopologySvg');
  const width = 1200, height = 400;
  
  // 风险/消息/ETF节点定义
  const nodes = [
    // 中心：市场状态
    { id: 'market', label: '市场状态', x: 600, y: 200, type: 'center', value: '震荡偏多' },
    
    // 风险节点（左侧）
    { id: 'risk_fed', label: '美联储', x: 150, y: 80, type: 'risk', value: '鹰派风险' },
    { id: 'risk_geo', label: '地缘政治', x: 150, y: 200, type: 'risk', value: '中东局势' },
    { id: 'risk_industry', label: '行业利空', x: 150, y: 320, type: 'risk', value: '医药集采' },
    
    // 消息节点（右侧）
    { id: 'msg_policy', label: '政策利好', x: 1050, y: 80, type: 'positive', value: '半导体支持' },
    { id: 'msg_data', label: '数据超预期', x: 1050, y: 200, type: 'positive', value: '新能源销量' },
    { id: 'msg_fund', label: '资金流入', x: 1050, y: 320, type: 'positive', value: '北向+86亿' },
    
    // ETF节点（中间层）
    { id: 'etf_chip', label: '芯片ETF', x: 400, y: 60, type: 'etf', value: '+2.31%' },
    { id: 'etf_ai', label: '人工智能ETF', x: 400, y: 140, type: 'etf', value: '+2.17%' },
    { id: 'etf_military', label: '军工ETF', x: 400, y: 220, type: 'etf', value: '+1.97%' },
    { id: 'etf_med', label: '医药ETF', x: 400, y: 300, type: 'etf', value: '-0.85%' },
    { id: 'etf_comm', label: '通信ETF', x: 400, y: 380, type: 'etf', value: '+1.77%' },
    
    // 右侧中间层
    { id: 'etf_nev', label: '新能源ETF', x: 800, y: 60, type: 'etf', value: '+1.61%' },
    { id: 'etf_sec', label: '证券ETF', x: 800, y: 140, type: 'etf', value: '+1.41%' },
    { id: 'etf_mil2', label: '军工ETF', x: 800, y: 220, type: 'etf', value: '+1.97%' },
    { id: 'etf_inno', label: '创新药ETF', x: 800, y: 300, type: 'etf', value: '-1.25%' },
    { id: 'etf_5g', label: '通信ETF', x: 800, y: 380, type: 'etf', value: '+1.77%' }
  ];
  
  // 关联关系定义
  const links = [
    // 风险 → 市场
    { from: 'risk_fed', to: 'market', type: 'negative' },
    { from: 'risk_geo', to: 'market', type: 'negative' },
    { from: 'risk_industry', to: 'market', type: 'negative' },
    
    // 消息 → 市场
    { from: 'msg_policy', to: 'market', type: 'positive' },
    { from: 'msg_data', to: 'market', type: 'positive' },
    { from: 'msg_fund', to: 'market', type: 'positive' },
    
    // 市场 → ETF
    { from: 'market', to: 'etf_chip', type: 'positive' },
    { from: 'market', to: 'etf_ai', type: 'positive' },
    { from: 'market', to: 'etf_military', type: 'positive' },
    { from: 'market', to: 'etf_med', type: 'negative' },
    { from: 'market', to: 'etf_comm', type: 'positive' },
    { from: 'market', to: 'etf_nev', type: 'positive' },
    { from: 'market', to: 'etf_sec', type: 'positive' },
    { from: 'market', to: 'etf_inno', type: 'negative' },
    
    // 风险 → ETF（直接影响）
    { from: 'risk_fed', to: 'etf_sec', type: 'negative' },
    { from: 'risk_industry', to: 'etf_med', type: 'negative' },
    { from: 'risk_industry', to: 'etf_inno', type: 'negative' },
    
    // 消息 → ETF（直接影响）
    { from: 'msg_policy', to: 'etf_chip', type: 'positive' },
    { from: 'msg_policy', to: 'etf_ai', type: 'positive' },
    { from: 'msg_data', to: 'etf_nev', type: 'positive' },
    { from: 'msg_fund', to: 'etf_mil2', type: 'positive' }
  ];
  
  // 绘制连线
  links.forEach(link => {
    const from = nodes.find(n => n.id === link.from);
    const to = nodes.find(n => n.id === link.to);
    if (!from || !to) return;
    
    const line = document.createElementNS('http://www.w3.org/2000/svg', 'line');
    line.setAttribute('x1', from.x);
    line.setAttribute('y1', from.y);
    line.setAttribute('x2', to.x);
    line.setAttribute('y2', to.y);
    line.setAttribute('stroke', link.type === 'positive' ? '#00e676' : '#ff4d6a');
    line.setAttribute('stroke-width', '2');
    line.setAttribute('stroke-opacity', '0.6');
    line.setAttribute('stroke-dasharray', link.type === 'negative' ? '5,5' : 'none');
    svg.appendChild(line);
  });
  
  // 绘制节点
  nodes.forEach(node => {
    const g = document.createElementNS('http://www.w3.org/2000/svg', 'g');
    
    // 节点圆圈
    const circle = document.createElementNS('http://www.w3.org/2000/svg', 'circle');
    circle.setAttribute('cx', node.x);
    circle.setAttribute('cy', node.y);
    circle.setAttribute('r', node.type === 'center' ? 35 : 25);
    
    // 颜色
    let fillColor, strokeColor;
    switch(node.type) {
      case 'center':
        fillColor = '#1a3a6a';
        strokeColor = '#4a6cf5';
        break;
      case 'risk':
        fillColor = '#4a1a1a';
        strokeColor = '#ff4d6a';
        break;
      case 'positive':
        fillColor = '#1a4a1a';
        strokeColor = '#00e676';
        break;
      case 'etf':
        fillColor = '#1a1a4a';
        strokeColor = '#a855f7';
        break;
      default:
        fillColor = '#1a1a4a';
        strokeColor = '#6b7b99';
    }
    
    circle.setAttribute('fill', fillColor);
    circle.setAttribute('stroke', strokeColor);
    circle.setAttribute('stroke-width', '2');
    g.appendChild(circle);
    
    // 节点标签
    const text = document.createElementNS('http://www.w3.org/2000/svg', 'text');
    text.setAttribute('x', node.x);
    text.setAttribute('y', node.y - 5);
    text.setAttribute('text-anchor', 'middle');
    text.setAttribute('fill', '#e0e6ff');
    text.setAttribute('font-size', node.type === 'center' ? '12' : '10');
    text.setAttribute('font-weight', node.type === 'center' ? 'bold' : 'normal');
    text.textContent = node.label;
    g.appendChild(text);
    
    // 节点值
    const value = document.createElementNS('http://www.w3.org/2000/svg', 'text');
    value.setAttribute('x', node.x);
    value.setAttribute('y', node.y + 12);
    value.setAttribute('text-anchor', 'middle');
    value.setAttribute('fill', strokeColor);
    value.setAttribute('font-size', '9');
    value.textContent = node.value;
    g.appendChild(value);
    
    svg.appendChild(g);
  });
  
  // 添加图例
  const legend = document.createElementNS('http://www.w3.org/2000/svg', 'g');
  legend.setAttribute('transform', 'translate(50, 380)');
  
  const legendItems = [
    { color: '#4a6cf5', label: '市场状态', dash: false },
    { color: '#ff4d6a', label: '风险因素', dash: true },
    { color: '#00e676', label: '利好消息', dash: false },
    { color: '#a855f7', label: 'ETF产品', dash: false }
  ];
  
  legendItems.forEach((item, i) => {
    const line = document.createElementNS('http://www.w3.org/2000/svg', 'line');
    line.setAttribute('x1', i * 150);
    line.setAttribute('y1', 0);
    line.setAttribute('x2', i * 150 + 20);
    line.setAttribute('y2', 0);
    line.setAttribute('stroke', item.color);
    line.setAttribute('stroke-width', '2');
    line.setAttribute('stroke-dasharray', item.dash ? '5,5' : 'none');
    legend.appendChild(line);
    
    const text = document.createElementNS('http://www.w3.org/2000/svg', 'text');
    text.setAttribute('x', i * 150 + 25);
    text.setAttribute('y', 5);
    text.setAttribute('fill', '#6b7b99');
    text.setAttribute('font-size', '11');
    text.textContent = item.label;
    legend.appendChild(text);
  });
  
  svg.appendChild(legend);
}
</script>
